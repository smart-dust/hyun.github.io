<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>대전대흥교회 청소년부</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fa;
}
.hero {
  margin-top: 0;
}
.hero h1,
.hero p {
  margin: 0;
}
html {
  scroll-behavior: smooth;
}

section {
  padding: 60px 20px;
  text-align: center;
  scroll-margin-top: 80px;
}

/* ✅ 메뉴 */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0,0,0,0.85);
  z-index: 1000;
}

.nav-container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 30px;
}

.nav-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.nav-logo {
  height: 35px;
}

.nav-title {
  color: white;
  font-weight: bold;
}

.nav-menu {
  display: flex;
  gap: 30px;
}

.nav-menu a {
  display: inline-block;
  line-height: 40px; 
  color: white;
  text-decoration: none;
  font-weight: bold;
}

.nav-menu a:hover {
  color: #9fc5e8;
}

/* ✅ 메인 */
.hero {
  height: 100vh;
  padding-top: 0;
  background: url('church.png') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  color: white;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.hero-content {
  position: relative;
  text-align: center;
}

.hero h1 {
  font-size: 48px;
}

.logo {
  height: 70px;
}

/* 버튼 */
.btn {
  margin: 10px;
  padding: 12px 20px;
  background: #6fa8dc;
  color: white;
  border-radius: 8px;
  text-decoration: none;
  display: inline-block;
}

/* 카드 */
.card {
  background: white;
  margin: 20px auto;
  padding: 30px;
  max-width: 700px;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.card:hover {
  transform: translateY(-5px);
}

h2 {
  color: #6fa8dc;
}
  iframe {
  width: 100%;
  height: 450px;   /* 👈 크게 */
  border-radius: 10px;
  border: none;
}
  .btn {
  margin: 10px 8px;
}
</style>
</head>

<body>

<!-- 메뉴 -->
<nav>
  <div class="nav-container">

    <div class="nav-left">
      <img src="logo.png" class="nav-logo">
      <span class="nav-title">대전대흥교회 청소년부</span>
    </div>

    <div class="nav-menu">
      <a href="#home">Home</a>
      <a href="#about">교회소개</a>
      <a href="#sermon">설교영상</a>
      <a href="#notice">공지사항</a>
      <a href="#community">커뮤니티</a>
    </div>

  </div>
</nav>

<!-- 메인 -->
<div class="hero" id="home">
  <div class="overlay"></div>
  <div class="hero-content">
    <img src="logo.png" class="logo">
    <h1>대전대흥교회 청소년부</h1>
    <p>예수님의 마음을 닮아가는 공동체</p>

    <a href="http://www.dhchurch.org/" target="_blank" class="btn">
      대전대흥교회 바로가기
    </a>
  </div>
</div>

<!-- 교회소개 -->
<section id="about">
  <div class="card">
    <h2>교회소개</h2>
    <p>하나님을 사랑하고 이웃을 섬기는 청소년 공동체입니다.</p>
  </div>
</section>

<!-- 설교 -->
<section id="sermon">
  <div class="card">
    <h2>설교영상</h2>
    <p>준비중입니다</p>
  </div>
</section>

<!-- 공지 -->
<section id="notice">
  <div class="card">
    <h2>공지사항</h2>
    <p>주일 오전 11시 교육선교관 2층</p>
  </div>
</section>

<!-- 커뮤니티 -->
<section id="community">
  <div class="card">
    <h2>커뮤니티</h2>
    <p>복음을 나누는 공간입니다 😊</p>
  </div>
</section>

<section>
  <div class="card">
    <h2>오시는 길</h2>

    <p>교육선교관 2층 : 대전광역시 중구 충무로 11번길 46</p>

    <!-- 지도 크게 -->
    <iframe 
      src="https://www.google.com/maps?q=대전광역시+중구+충무로+11번길+46&output=embed">
    </iframe>

    <!-- 버튼들 -->
    <div style="margin-top:20px;">
      
      <a href="https://map.kakao.com/link/search/대전광역시 중구 충무로 11번길 46" 
         target="_blank" 
         class="btn" 
         style="background:#f7e600; color:black;">
          카카오 길찾기
      </a>

      <a href="https://map.naver.com/v5/search/대전광역시 중구 충무로 11번길 46" 
         target="_blank" 
         class="btn" 
         style="background:#03c75a;">
          네이버 길찾기
      </a>

    </div>

  </div>
</section>

</body>
</html>
