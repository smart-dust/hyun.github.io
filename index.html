<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>대전대흥교회 청소년부</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fa;
}
.hero {
  margin-top: 0;
}
.hero h1,
.hero p {
  margin: 0;
}
html {
  scroll-behavior: smooth;
}

section {
  padding: 60px 20px;
  text-align: center;
  scroll-margin-top: 80px;
}

nav {
  nav {
  height: 60px;          /* 원하는 메뉴바 높이 */
  display: flex;
  align-items: center;   /* 세로 중앙 정렬 */
  padding: 0 20px;
}
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0, 0, 0, 0.7); /* 불투명도 70% */
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  z-index: 1000;
}

/* 컨테이너: 왼쪽 로고 + 중앙 메뉴 */
.nav-container {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between; /* 왼쪽+가운데 분리 */
  align-items: center;
  padding: 5px 20px; /* 상하 공간 줄임 */
}

/* 왼쪽 로고+이름 */
.nav-left {
  display: flex;
  align-items: center;
  gap: 8px;
   margin: 0;
}

.nav-left img {
  height: 45px;
}

.nav-title {
  color: white;
  font-weight: bold;
  font-size: 18px;
}

/* 가운데 메뉴 */
.nav-menu {
  display: flex;
  gap: 8px;
  justify-content: center; 
  flex: 1;
    margin: 0 auto;
}

/* 메뉴 아이템 */
.menu-item {
  position: relative;
}

/* 메뉴 버튼 */
.nav-menu a {
  display: block;
  padding: 8px 16px;
  color: white;
  text-decoration: none;
  font-weight: 600;
  border-radius: 6px;
  transition: background 0.2s, transform 0.2s;
}

.nav-menu a:hover {
  background: rgba(255,255,255,0.15);
  transform: translateY(-2px);
}

/* 서브메뉴 */
.submenu {
  position: absolute;
  top: 40px;
  left: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(6px);
  min-width: 160px;
  border-radius: 8px;
  opacity: 0;
  visibility: hidden;
  transform: translateY(8px);
  transition: all 0.25s ease;
}

.menu-item:hover .submenu {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

.submenu a {
  display: block;
  padding: 10px 15px;
  color: white;
}

.submenu a:hover {
  background: rgba(255,255,255,0.1);
}

/* 본문이 메뉴바에 가리지 않도록 */
body {
  padding-top: 70px; /* 메뉴바 높이에 맞춤 */
}

/* 본문 padding */
.content {
  padding-top: 70px; /* 메뉴바 높이에 맞춤 */
}
/* ✅ 메인 */
.hero {
  height: 100vh;
  padding-top: 0;
  background: url('church.png') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  color: white;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.hero-content {
  position: relative;
  text-align: center;
}

.hero h1 {
  font-size: 48px;
}

.logo {
  height: 70px;
}

/* 버튼 */
.btn {
  margin: 10px;
  padding: 12px 20px;
  background: #6fa8dc;
  color: white;
  border-radius: 8px;
  text-decoration: none;
  display: inline-block;
}

/* 카드 */
.card {
  background: white;
  margin: 20px auto;
  padding: 30px;
  max-width: 700px;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.card:hover {
  transform: translateY(-5px);
}

h2 {
  color: #6fa8dc;
}
  iframe {
  width: 100%;
  height: 450px;   /* 👈 크게 */
  border-radius: 10px;
  border: none;
}
  .btn {
  margin: 10px 8px;
}
</style>
</head>
