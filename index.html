<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>대전대흥교회 청소년부</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Nanum+Brush+Script&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Noto Sans KR', sans-serif;
  background:#f5f7fa;
  color:#333;
}
html { scroll-behavior:smooth; }
a { text-decoration:none; }

/* 메뉴 */
nav {
  position:fixed;
  top:0;
  width:100%;
  background:rgba(0,0,0,0.9);
  z-index:1000;
}
.nav-container {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 30px;
}
.nav-home { display:flex; align-items:center; gap:10px; }
.nav-logo { height:35px; }
.nav-title { color:white; font-size:18px; }

.nav-menu {
  display:flex;
  gap:20px;
}

/* 메뉴 아이템 */
.menu-item {
  position:relative;
}
.menu-item > a {
  color:white;
  padding:10px 12px;
  display:block;
  border-radius:6px;
  transition:0.2s;
}
.menu-item > a:hover {
  background:rgba(255,255,255,0.15);
}

/* 서브메뉴 */
.submenu {
  position:absolute;
  top:110%;
  left:0;
  min-width:180px;
  background:rgba(0,0,0,0.95);
  border-radius:10px;
  opacity:0;
  visibility:hidden;
  transform:translateY(10px);
  transition:0.25s;
}
.submenu a {
  display:block;
  padding:10px 15px;
  color:white;
  font-size:14px;
}
.submenu a:hover {
  background:rgba(255,255,255,0.15);
}

/* hover 시 등장 */
.menu-item:hover .submenu {
  opacity:1;
  visibility:visible;
  transform:translateY(0);
}

/* 히어로 */
.hero {
  height:100vh;
  background:url('church.png') center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
  position:relative;
}
.overlay {
  position:absolute;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
}
.hero-content { position:relative; z-index:1; }

.hero-content h1 {
  font-family:'Nanum Brush Script', cursive;
  font-size:64px;
}
.hero-content p { font-size:16px; }

/* 버튼 */
.btn {
  display:inline-block;
  margin:10px 5px;
  padding:12px 20px;
  background:#6fa8dc;
  color:white;
  border-radius:8px;
  font-weight:700;
}

/* 섹션 */
.section-container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:30px;
  padding:80px 20px;
}
.section-box {
  display:block;
  width:260px;
  background:white;
  border-radius:12px;
  padding:30px;
  text-align:center;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
  color:inherit;
  transition:0.25s;
}
.section-box:hover {
  transform:translateY(-5px);
}

/* 영상 */
.video-box iframe {
  width:100%;
  height:200px;
  border-radius:10px;
}

/* 지도 */
.map-section {
  background:white;
  border-radius:12px;
  padding:30px;
  max-width:700px;
  margin:80px auto;
}
.map-section iframe {
  width:100%;
  height:450px;
  border:none;
  border-radius:10px;
}

/* footer */
.footer {
  background:#222;
  color:#ccc;
  text-align:center;
  padding:40px;
}
</style>
</head>

<body>

<!-- 메뉴 -->
<nav>
  <div class="nav-container">

    <a href="#home" class="nav-home">
      <img src="logo.png" class="nav-logo">
      <span class="nav-title">대전대흥교회 청소년부</span>
    </a>

    <div class="nav-menu">

      <div class="menu-item">
        <a href="#home">Home</a>
      </div>

      <div class="menu-item">
        <a href="about.html">교회소개</a>
        <div class="submenu">
          <a href="about.html#mission">사명과 비전</a>
          <a href="about.html#worship">예배 안내</a>
          <a href="about.html#staff">섬기는 사람들</a>
        </div>
      </div>

      <div class="menu-item">
        <a href="sermon.html">설교</a>
        <div class="submenu">
          <a href="sermon.html#1">설교 영상</a>
          <a href="sermon.html#2">공과 공부</a>
        </div>
      </div>

      <div class="menu-item">
        <a href="notice.html">공지사항</a>
        <div class="submenu">
          <a href="notice.html#1">행사 안내</a>
          <a href="notice.html#2">주보</a>
        </div>
      </div>

      <div class="menu-item">
        <a href="community.html">커뮤니티</a>
        <div class="submenu">
          <a href="community.html#1">사진 갤러리</a>
          <a href="community.html#2">게시판</a>
        </div>
      </div>

    </div>
  </div>
</nav>

<!-- 히어로 -->
<div class="hero" id="home">
  <div class="overlay"></div>
  <div class="hero-content">
    <h1>하나님이 보시기에 기쁘신 교회</h1>
    <p>대전대흥교회 청소년부</p>
    <a href="#info" class="btn">예배 안내</a>
  </div>
</div>

<!-- 섹션 -->
<section class="section-container" id="info">

  <a href="about.html" class="section-box">
    <h2>교회소개</h2>
    <p>청소년들이 하나님을 예배하는 공동체</p>
  </a>

  <a href="about.html#worship" class="section-box">
    <h2>예배 안내</h2>
    <p>주일 오전 11시</p>
  </a>

  <a href="notice.html" class="section-box">
    <h2>공지사항</h2>
    <p>최신 소식 확인</p>
  </a>

  <div class="section-box video-box">
    <h2>설교 영상</h2>
    <iframe src="https://www.youtube.com/embed/nD5G_htVfOY?rel=0&modestbranding=1"
    allowfullscreen></iframe>
  </div>

</section>

<!-- 지도 -->
<section class="map-section">
  <h2>오시는 길</h2>
  <iframe src="https://www.google.com/maps?q=대전광역시+중구+충무로+11번길+43&output=embed"></iframe>
</section>

<!-- footer -->
<footer class="footer">
  <p>© 2026 대전대흥교회 청소년부</p>
</footer>

</body>
</html>
