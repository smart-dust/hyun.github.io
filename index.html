<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>대전대흥교회 청소년부</title>

<style>
/* 기본 스타일 */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fa;
}

/* 상단 메뉴바 */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  height: 60px; /* 메뉴바 높이 */
  display: flex;
  align-items: center;
  background: rgba(0,0,0,0.7); /* 70% 불투명 */
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  z-index: 1000;
}

/* 컨테이너: 왼쪽 로고 + 중앙 메뉴 */
.nav-container {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0; /* 왼쪽/오른쪽 여백 제거 */
}

/* 왼쪽 로고+이름 */
.nav-left {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: 0; /* 완전 왼쪽 */
}

.nav-left img {
  height: 45px;
}

.nav-title {
  color: white;
  font-weight: bold;
  font-size: 18px;
}

/* 가운데 메뉴 */
.nav-menu {
  display: flex;
  gap: 8px;
  flex: 1;
  justify-content: center;
}

.menu-item {
  position: relative;
}

.nav-menu a {
  display: block;
  padding: 8px 16px;
  color: white;
  text-decoration: none;
  font-weight: 600;
  border-radius: 6px;
  transition: background 0.2s, transform 0.2s;
}

.nav-menu a:hover {
  background: rgba(255,255,255,0.15);
  transform: translateY(-2px);
}

/* 서브메뉴 */
.submenu {
  position: absolute;
  top: 40px;
  left: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(6px);
  min-width: 160px;
  border-radius: 8px;
  opacity: 0;
  visibility: hidden;
  transform: translateY(8px);
  transition: all 0.25s ease;
}

.menu-item:hover .submenu {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

.submenu a {
  display: block;
  padding: 10px 15px;
  color: white;
}

.submenu a:hover {
  background: rgba(255,255,255,0.1);
}

/* 본문이 메뉴바에 가리지 않도록 */
body {
  padding-top: 60px; /* 메뉴바 높이와 일치 */
}

/* 히어로 섹션 */
.hero {
  height: calc(100vh - 60px); /* 메뉴바 제외 */
  margin: 0;
  display: flex;
  align-items: center; /* 세로 중앙 */
  justify-content: center; /* 가로 중앙 */
  position: relative;
  background: url('church.png') center top/cover no-repeat;
  color: white;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.hero-content {
  position: relative;
  text-align: center;
}

.hero h1 {
  font-size: 48px;
}

.logo {
  height: 70px;
}
</style>
</head>

<body>
<nav>
  <div class="nav-container">
    <div class="nav-left">
      <img src="logo.png" alt="로고">
      <span class="nav-title">대전대흥교회 청소년부</span>
    </div>

    <div class="nav-menu">
      <div class="menu-item"><a href="#home">Home</a></div>
      <div class="menu-item">
        <a href="about.html">교회소개</a>
        <div class="submenu">
          <a href="about.html#vision">비전</a>
          <a href="about.html#worship">예배 안내</a>
          <a href="about.html#teacher">섬기는 이들</a>
        </div>
      </div>
      <div class="menu-item">
        <a href="sermon.html">설교영상</a>
        <div class="submenu">
          <a href="sermon.html#this">이번주 설교</a>
          <a href="sermon.html#all">전체 설교</a>
        </div>
      </div>
      <div class="menu-item">
        <a href="notice.html">공지사항</a>
        <div class="submenu">
          <a href="notice.html#weekseet">주보</a>
          <a href="notice.html#notation">공지사항</a>
        </div>
      </div>
      <div class="menu-item">
        <a href="community.html">커뮤니티</a>
        <div class="submenu">
          <a href="community.html#photo">포토 갤러리</a>
          <a href="community.html#community">우리들의 이야기</a>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- 메인 -->
<div class="hero" id="home">
  <div class="overlay"></div>
  <div class="hero-content">
    <img src="logo.png" class="logo">
    <h1>대전대흥교회 청소년부</h1>
    <p>예수님의 마음을 닮아가는 공동체</p>
  </div>
</div>

</body>
</html>
