<style>
/* 기본 폰트 */
body {
  margin:0;
  font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', Arial, sans-serif;
  background:#f5f7fa;
}
html { scroll-behavior: smooth; }

/* 메뉴 */
nav {
  position: fixed;
  top:0;
  width:100%;
  background:rgba(0,0,0,0.85);
  z-index:1000;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
}
.nav-container {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 30px;
}
.nav-home {
  display:flex;
  align-items:center;
  gap:10px;
  text-decoration:none;
}
.nav-logo { height:35px; width:auto; }
.nav-title { color:white; font-weight:400; font-size:18px; }
.nav-menu { display:flex; gap:30px; align-items:center; }
.nav-menu a, .menu-item > a {
  text-decoration:none;
  color:white;
  font-weight:600;
  padding:10px 12px;
  position:relative;
  border-radius:6px;
  transition: transform 0.25s ease, background 0.25s ease;
  background:none;
}
.nav-menu a:hover, .menu-item > a:hover,
.menu-item.active > a { transform: translateY(-2px); background: rgba(255,255,255,0.08); }

/* 서브메뉴 */
.menu-item { position:relative; }
.submenu {
  position:absolute; top:100%; left:0; min-width:220px; max-width:260px; padding:10px 0;
  background:rgba(0,0,0,0.95); border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
  opacity:0; visibility:hidden; transform:translateY(8px);
  transition:opacity 0.3s ease, transform 0.3s ease; pointer-events:none; z-index:1001;
}
.submenu a {
  display:block;
  padding:12px 20px;
  color:white;
  font-weight:400;
  text-align:left;
  border-radius:6px;
  transition: background 0.2s ease, transform 0.2s ease;
}
.submenu a:hover, .submenu a.active { transform:translateY(-2px); background:rgba(255,255,255,0.12); }
.menu-item:hover .submenu { opacity:1; visibility:visible; transform:translateY(0); pointer-events:auto; }

/* 히어로 */
.hero {
  height:100vh; /* 화면 전체 유지 */
  background: url('church.png') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  color:white;
}
.overlay { position:absolute; width:100%; height:100%; background:rgba(0,0,0,0.5); }
.hero-content { position:relative; text-align:center; }

/* 교회 이름 크고 중앙 */

  font-size:48px;  /* 원래 슬로건 크기 */
  margin-bottom:20px;
}

/* 슬로건 작게 손글씨 */
.hero-content p {
  font-family: 'Nanum Brush Script', cursive;
  font-size:22px;  /* 원래 교회 이름 크기 */
  color:white;
  margin-bottom:25px;
}

/* 버튼 */
.btn {
  margin:10px 8px;
  padding:12px 20px;
  background:#6fa8dc;
  color:white;
  border-radius:8px;
  text-decoration:none;
  display:inline-block;
  font-weight:700;
  transition: transform 0.15s ease, background 0.25s ease;
}
.btn:hover { background:#7fb8e0; transform:translateY(-2px); }
.btn:active { transform:translateY(1px); background:#5f8cc0; }

/* 섹션 박스 디자인 */
.section-container {

  flex-wrap:wrap;
  justify-content:center;
  gap:30px;
  padding:60px 20px;

  border-radius:12px;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
  width:250px;
  padding:30px;
  text-align:center;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}
.section-box:hover { transform:translateY(-5px); box-shadow:0 8px 25px rgba(0,0,0,0.2); }
.section-box img { width:60px; margin-bottom:15px; }
.section-box h2 { color:#6fa8dc; margin-bottom:10px; }
.section-box p { font-size:15px; line-height:1.6; color:#555; }

/* 지도 */
iframe { width:100%; height:450px; border-radius:10px; border:none; }
