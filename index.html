<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fa;
}
.hero {
  margin-top: 0;
}
.hero h1,
.hero p {
  margin: 0;
}
html {
  scroll-behavior: smooth;
}

section {
  padding: 60px 20px;
  text-align: center;
  scroll-margin-top: 80px;
}

/* ✅ 메뉴 */
/* ================== 상단 네비 ================== */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0,0,0,0.85);
  z-index: 1000;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}

.nav-container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 30px;
}

.nav-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.nav-logo {
  height: 35px;
  width: auto;
}

.nav-title {
  color: white;
  font-weight: bold;
  font-size: 18px;
}

.nav-menu {
  display: flex;
  gap: 30px;
  align-items: center;
}

.nav-menu a {
  text-decoration: none;
  color: white;
  font-weight: 600;
  padding: 10px 12px;
  position: relative;
  transition: color 0.2s, background 0.2s;
  border-radius: 6px;
}

/* ================== 서브 메뉴 ================== */
.menu-item {
  position: relative;
}

.submenu {
  position: absolute;
  top: 100%;
  left: 0;
  min-width: 200px;   /* 더 넉넉하게 */
  max-width: 250px;   /* 제한 */
  padding: 8px 0;
  background: rgba(0,0,0,0.95);
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  opacity: 0;
  visibility: hidden;
  transform: translateY(5px);
  transition: opacity 0.25s ease, transform 0.25s ease;
  pointer-events: none;
  z-index: 1001;
}

.submenu a {
  display: block;
  padding: 12px 20px;  /* 더 넓은 패딩 */
  color: white;
  font-weight: 400;
  text-align: left;
  transition: background 0.2s;
  border-radius: 6px;
}

.submenu a:hover,
.submenu a.active {
  background: rgba(255,255,255,0.15); /* 강조 */
}

/* ================== 서브 메뉴 표시 ================== */
.menu-item:hover .submenu,
.menu-item.active .submenu {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
  pointer-events: auto;
}

/* ================== 메인 메뉴 강조 ================== */
.menu-item:hover > a,
.menu-item.active > a {
  background: rgba(255,255,255,0.1); /* 이전보다 진하게 */
  box-shadow: inset 0 -3px 0 rgba(111,168,220,0.8); /* 바 형태 강조 */
}
/* ✅ 메인 */
.hero {
  height: 100vh;
  padding-top: 0;
  background: url('church.png') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  color: white;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.hero-content {
  position: relative;
  text-align: center;
}

.hero h1 {
  font-size: 48px;
}

.logo {
  height: 70px;
}

/* 버튼 */
.btn {
  margin: 10px;
  padding: 12px 20px;
  background: #6fa8dc;
  color: white;
  border-radius: 8px;
  text-decoration: none;
  display: inline-block;
}

/* 카드 */
.card {
  background: white;
  margin: 20px auto;
  padding: 30px;
  max-width: 700px;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.card:hover {
  transform: translateY(-5px);
}

h2 {
  color: #6fa8dc;
}
  iframe {
  width: 100%;
  height: 450px;   /* 👈 크게 */
  border-radius: 10px;
  border: none;
}
  .btn {
  margin: 10px 8px;
}
</style>
</head>
