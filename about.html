<style>
  /* 기본 리셋 */
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* 상단 고정 메뉴바 */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  background-color: #333;
  display: flex;
  justify-content: center;
  z-index: 1000;
}

/* 메뉴 리스트 */
.navbar ul {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
}

/* 메뉴 아이템 */
.navbar li {
  position: relative;
}

/* 메뉴 링크 */
.navbar a {
  display: block;
  padding: 15px 20px;
  color: white;
  text-decoration: none;
}

/* hover 효과 */
.navbar a:hover {
  background-color: #555;
}

/* 드롭다운 메뉴 */
.dropdown {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  background-color: #444;
  min-width: 150px;
}

/* 드롭다운 아이템 */
.dropdown a {
  display: block;
  padding: 10px;
}

/* hover 시 드롭다운 표시 */
.navbar li:hover .dropdown {
  display: block;
}

/* 페이지 내용이 메뉴에 가리지 않도록 */
.content {
  padding-top: 70px;
}
  .navbar {
  box-shadow: 0 2px 5px rgba(0,0,0,0.3);
}
  .dropdown {
  opacity: 0;
  visibility: hidden;
  transition: 0.3s;
}

.navbar li:hover .dropdown {
  opacity: 1;
  visibility: visible;
}
  </style>

        </div>
      </li>

      <li>

        </div>
      </li>

  </div>

  <!-- 본문 -->
