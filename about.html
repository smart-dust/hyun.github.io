<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>대전대흥교회 청소년부 - 교회소개</title>
<style>
body { margin:0; font-family:Arial,sans-serif; background:#f5f7fa; }
html { scroll-behavior:smooth; }
section { padding:60px 20px; text-align:center; scroll-margin-top:80px; }

/* 메뉴 */
nav { position:fixed; top:0; width:100%; background:rgba(0,0,0,0.85); z-index:1000; box-shadow:0 2px 6px rgba(0,0,0,0.3); }
.nav-container { display:flex; justify-content:space-between; align-items:center; padding:10px 30px; }

/* 로고+타이틀 */
.nav-home { display:flex; align-items:center; gap:10px; text-decoration:none; }
.nav-logo { height:35px; width:auto; }
.nav-title { color:white; font-weight:400; font-size:18px; transition:none; }

/* 메인 메뉴 */
.nav-menu { display:flex; gap:30px; align-items:center; }
.nav-menu a, .menu-item > a {
  text-decoration:none; color:white; font-weight:600;
  padding:10px 12px; position:relative; border-radius:6px;
  transition: transform 0.25s ease, background 0.25s ease;
}
.nav-menu a:hover, .nav-menu a:focus, .nav-menu a.active,
.menu-item > a:hover, .menu-item > a:focus, .menu-item > a.active {
  transform: translateY(-2px);
  background: rgba(255,255,255,0.08);
}

/* 서브 메뉴 */
.menu-item { position:relative; }
.submenu {
  position:absolute; top:100%; left:0;
  min-width:220px; max-width:260px; padding:10px 0;
  background:rgba(0,0,0,0.95); border-radius:12px; box-shadow:0 8px 20px rgba(0,0,0,0.4);
  opacity:0; visibility:hidden; transform:translateY(8px);
  transition:opacity 0.3s ease, transform 0.3s ease; pointer-events:none; z-index:1001;
}
.submenu a { display:block; padding:12px 20px; color:white; font-weight:400; text-align:left; border-radius:6px; transition: background 0.2s ease, transform 0.2s ease; }
.submenu a:hover, .submenu a.active { transform:translateY(-2px); background:rgba(255,255,255,0.12); }
.menu-item:hover .submenu, .menu-item.active .submenu { opacity:1; visibility:visible; transform:translateY(0); pointer-events:auto; }

/* 히어로 */
.hero { height:100vh; background:url('church.png') center/cover no-repeat; display:flex; align-items:center; justify-content:center; position:relative; color:white; }
.overlay { position:absolute; width:100%; height:100%; background:rgba(0,0,0,0.5); }
.hero-content { position:relative; text-align:center; }
.hero h1 { font-size:48px; }
.logo { height:70px; }

/* 버튼 */
.btn { margin:10px 8px; padding:12px 20px; background:#6fa8dc; color:white; border-radius:8px; text-decoration:none; display:inline-block; }

/* 카드 */
.card { background:white; margin:20px auto; padding:30px; max-width:700px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
.card:hover { transform:translateY(-5px); }
h2 { color:#6fa8dc; }
iframe { width:100%; height:450px; border-radius:10px; border:none; }
</style>
</head>
<body>

<nav>
  <div class="nav-container">
    <div class="nav-left">
      <a href="index.html" class="nav-home">

        <span class="nav-title">대전대흥교회 청소년부</span>
      </a>
    </div>

    <div class="nav-menu">
      <a href="index.html">Home</a>
      <div class="menu-item">
        <a href="about.html" class="active">교회소개</a>
        <div class="submenu">
          <a href="#vision">비전</a>
          <a href="#worship">예배 안내</a>
          <a href="#teacher">섬기는 이들</a>
        </div>
      </div>
      <div class="menu-item">
        <a href="sermon.html">설교영상</a>
        <div class="submenu">
          <a href="sermon.html#this">이번주 설교</a>
          <a href="sermon.html#all">전체 설교</a>
        </div>
      </div>
      <div class="menu-item">
        <a href="notice.html">공지사항</a>
        <div class="submenu">
          <a href="notice.html#weekseet">주보</a>
          <a href="notice.html#notation">공지사항</a>
        </div>
      </div>
      <div class="menu-item">
        <a href="community.html">커뮤니티</a>
        <div class="submenu">
          <a href="community.html#photo">포토 갤러리</a>
          <a href="community.html#community">우리들의 이야기</a>
        </div>
      </div>
    </div>
  </div>
</nav>

<div class="hero" id="home">
  <div class="overlay"></div>
  <div class="hero-content">
    <img src="logo.png" class="logo">
    <h1>교회소개</h1>
    <p>대전대흥교회 청소년부의 비전과 예배, 섬기는 이들을 소개합니다.</p>
  </div>
</div>

<section id="vision">
  <div class="card">
    <h2>비전</h2>
    <p>하나님을 사랑하고 이웃을 섬기는 청소년 공동체로 성장합니다.</p>
  </div>

  </div>
</section>

</html>
