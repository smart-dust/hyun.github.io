<!DOCTYPE html>

<title>커뮤니티</title>
<style>
/* 기본 리셋 */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fa;
}

/* 상단 메뉴바 그대로 사용 */
.nav-menu {
  display: flex;
  gap: 8px;
  align-items: center;
  padding: 5px 20px;
  background: rgba(0,0,0,0.85);
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 1000;
  box-shadow: 0 2px 5px rgba(0,0,0,0.3);
}
.menu-item { position: relative; }
.nav-menu a {
  display: block;
  padding: 8px 16px;
  color: white;
  text-decoration: none;
  font-weight: 600;
  border-radius: 6px;
  transition: all 0.2s ease;
}
.nav-menu a:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px);}
.nav-menu a:active { transform: translateY(0);}
.submenu {
  position: absolute;
  top: 45px; left: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(6px);
  min-width: 160px;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  opacity: 0;
  visibility: hidden;
  transform: translateY(10px);
  transition: all 0.25s ease;
}
.submenu a { padding: 10px 15px; font-size: 14px; color: white;}
.submenu a:hover { background: rgba(255,255,255,0.1);}
.menu-item:hover .submenu { opacity: 1; visibility: visible; transform: translateY(0);}

/* 본문과 메뉴바 겹치지 않도록 */
.content {
  padding-top: 70px;
  max-width: 900px;
  margin: auto;
}

/* 카드형 섹션 */
.card {
  background: rgba(255,255,255,0.9);
  margin: 20px 0;
  padding: 25px 30px;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

/* 카드 제목 */
.card h2 {
  color: #6fa8dc;
  margin-top: 0;
}

/* 버튼 스타일 */
.btn {
  margin: 10px 5px;
  padding: 10px 18px;
  background: #6fa8dc;
  color: white;
  border-radius: 8px;
  text-decoration: none;
  display: inline-block;
  transition: 0.2s;
}
.btn:hover { background: #558acb; }
</style>
</head>
