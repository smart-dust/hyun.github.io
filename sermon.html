<style>
/* 🔥 공통 스타일 (index랑 동일) */
body { margin:0; font-family:'Noto Sans KR','Apple SD Gothic Neo',Arial,sans-serif; background:#111; color:white; }
a { text-decoration:none; }

nav { position:fixed; top:0; width:100%; background:rgba(0,0,0,0.85); z-index:1000; }
.nav-container { display:flex; justify-content:space-between; align-items:center; padding:10px 30px; }
.nav-home { display:flex; align-items:center; gap:10px; }
.nav-logo { height:35px; }
.nav-title { color:white; font-size:18px; }

.nav-menu { display:flex; gap:25px; }
.nav-menu a, .menu-item > a {
  color:white; padding:10px 12px; border-radius:6px;
  transition:0.25s;
}
.nav-menu a:hover, .menu-item > a:hover {
  transform:translateY(-2px);
  background:rgba(255,255,255,0.08);
}

/* 서브메뉴 */
.menu-item { position:relative; }
.submenu {
  position:absolute; top:100%; left:0;
  background:rgba(0,0,0,0.95);
  border-radius:10px; padding:10px 0;
  opacity:0; visibility:hidden; transform:translateY(8px);
  transition:0.25s;
}
.menu-item:hover .submenu {
  opacity:1; visibility:visible; transform:translateY(0);
}
.submenu a { display:block; padding:10px 20px; }

/* 콘텐츠 */
.container { padding-top:100px; max-width:1000px; margin:auto; }
.video { margin-bottom:40px; }
iframe { width:100%; height:500px; border-radius:10px; }

/* footer */
.footer { background:#000; color:#aaa; padding:30px; text-align:center; }
</style>
