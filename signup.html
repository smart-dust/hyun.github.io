<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 | 대전대흥교회 청소년부</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #007bff;
            --dark-blue: #0056b3;
            --bg-soft: #fcfdfe;
            --text-main: #444;
            --text-dark: #222;
            --border-color: #e2e8f0;
        }

        /* 레이아웃 안정화: 꿀렁임 방지 */
        * { box-sizing: border-box; } 
        
        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #ffffff;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .signup-container {
            width: 100%;
            max-width: 680px;
            background: #ffffff;
            /* 상단 하늘색 라인 제거 및 부드러운 그림자만 유지 */
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            border-radius: 20px;
            padding: 60px 50px;
            border: 1px solid #f0f0f0;
        }

        header { text-align: center; margin-bottom: 50px; }
        header h1 { font-size: 2.4rem; font-weight: 900; color: var(--text-dark); margin: 0; letter-spacing: -1.5px; }
        header p { font-size: 1.1rem; color: #777; margin-top: 12px; font-weight: 400; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px 40px; }
        .field.full { grid-column: span 2; }

        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        label { font-size: 0.95rem; font-weight: 700; color: var(--text-dark); }

        .check-btn {
            font-size: 0.8rem;
            color: var(--primary-blue);
            background: #fff;
            border: 1px solid var(--primary-blue);
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .check-btn:hover { background: var(--primary-blue); color: #fff; }
        .check-btn:active { transform: scale(0.95); }

        /* 입력창 및 셀렉트 박스 디자인 통일 */
        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 1rem;
            background: #fdfdfd;
            color: var(--text-dark);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            appearance: none; /* 기본 화살표 제거 후 커스텀 */
        }

        /* 셀렉트 박스 커스텀 화살표 디자인 */
        .select-wrapper {
            position: relative;
            width: 100%;
        }
        .select-wrapper::after {
            content: '▼';
            font-size: 0.7rem;
            color: #aaa;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.08);
            background: #fff;
        }

        .church-group { display: flex; flex-direction: column; gap: 10px; }
        #other-church-input { display: none; margin-top: 5px; }

        .privacy-box {
            grid-column: span 2;
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            font-size: 0.85rem;
            line-height: 1.7;
            color: #666;
            height: 130px;
            overflow-y: auto;
            border: 1px solid #edf2f7;
            margin-top: 10px;
        }

        .agreement-row {
            grid-column: span 2;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
        }
        .agreement-row span { font-weight: 500; cursor: pointer; color: #555; }
        .agreement-row input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; accent-color: var(--primary-blue); }

        .submit-btn {
            grid-column: span 2;
            padding: 20px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s ease;
        }
        .submit-btn:hover { background: var(--dark-blue); box-shadow: 0 8px 20px rgba(0,123,255,0.2); }
        .submit-btn:active { transform: scale(0.98); }

        .nav-links {
            grid-column: span 2;
            text-align: center;
            margin-top: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .nav-links a {
            color: #999;
            text-decoration: none;
            font-size: 0.95rem;
            padding: 5px 10px;
            transition: color 0.2s ease;
        }
        .nav-links a:hover { color: var(--primary-blue); }
        .divider { width: 1px; height: 14px; background-color: #eee; }
    </style>
</head>
<body>

    <div class="signup-container">
        <header>
            <h1>반갑습니다!</h1>
            <p>대전대흥교회 청소년부의 가족이 되어주세요.</p>
        </header>

        <div class="form-grid">
            <div class="field full">
                <div class="label-row">
                    <label>아이디 (이메일)</label>
                    <button type="button" class="check-btn" id="check-id">중복확인</button>
                </div>
                <input type="email" id="email" placeholder="사용하실 이메일 주소를 입력해주세요" required>
            </div>

            <div class="field">
                <label>비밀번호</label>
                <input type="password" id="password" placeholder="6자리 이상 입력" required>
            </div>
            <div class="field">
                <label>비밀번호 재확인</label>
                <input type="password" id="password-confirm" placeholder="동일하게 입력" required>
            </div>

            <div class="field">
                <label>이름</label>
                <input type="text" id="name" placeholder="실명을 입력해주세요" required>
            </div>
            <div class="field">
                <label>닉네임</label>
                <input type="text" id="nickname" placeholder="활동할 닉네임" required>
            </div>

            <div class="field full">
                <label>출석 교회</label>
                <div class="church-group">
                    <div class="select-wrapper">
                        <select id="church-select">
                            <option value="대전대흥교회" selected>대전대흥교회</option>
                            <option value="기타">기타 (직접 입력)</option>
                        </select>
                    </div>
                    <input type="text" id="other-church-input" placeholder="교회 이름을 입력해주세요">
                </div>
            </div>

            <div class="field full">
                <label>교회코드 <span style="font-weight:400; color:#aaa; font-size:0.8rem;">(대전대흥교회 청소년부일 경우 입력)</span></label>
                <input type="text" id="auth-code" placeholder="코드를 입력해주세요">
            </div>

            <div class="privacy-box">
                <strong>개인정보 수집 및 이용 동의 (필수)</strong>
                1. 수집 및 이용 목적: 회원 식별, 소식 전달, 공동체 내 소통 및 게시판 관리<br>
                2. 수집 항목: 이메일(ID), 이름, 닉네임, 출석교회 정보<br>
                3. 보유 및 이용 기간: 회원 탈퇴 시 즉시 파기<br>
                4. 동의 거부 권리: 귀하는 동의를 거부할 권리가 있으며, 거부 시 서비스 이용이 제한될 수 있습니다.
            </div>

            <div class="agreement-row">
                <span onclick="document.getElementById('agree').click()">개인정보 수집 및 이용에 동의합니다.</span>
                <input type="checkbox" id="agree">
            </div>

            <button id="signup-btn" class="submit-btn">가입 완료하기</button>

            <div class="nav-links">
                <a href="index.html">홈페이지로 돌아가기</a>
                <span class="divider"></span>
                <a href="login.html">로그인 하기</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, fetchSignInMethodsForEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAp8majwjPetRnK5u9f_agOWEcW2_veBdw",
            authDomain: "dhchurch-cf85f.firebaseapp.com",
            projectId: "dhchurch-cf85f",
            storageBucket: "dhchurch-cf85f.firebasestorage.app",
            messagingSenderId: "718998916531",
            appId: "1:718998916531:web:6d5641ed5a404c2ee0cfc6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isChecked = false;

        const select = document.getElementById('church-select');
        const otherInput = document.getElementById('other-church-input');
        select.addEventListener('change', (e) => {
            otherInput.style.display = e.target.value === '기타' ? 'block' : 'none';
        });

        document.getElementById('check-id').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            if(!email) { alert("이메일을 입력해주세요."); return; }
            try {
                const methods = await fetchSignInMethodsForEmail(auth, email);
                if(methods.length > 0) { alert("이미 가입된 아이디입니다."); isChecked = false; }
                else { alert("사용 가능한 아이디입니다."); isChecked = true; }
            } catch(e) { alert("확인 중 오류가 발생했습니다."); }
        });

        document.getElementById('signup-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password-confirm').value;
            const name = document.getElementById('name').value;
            const nickname = document.getElementById('nickname').value;
            const authCode = document.getElementById('auth-code').value;
            const agree = document.getElementById('agree').checked;
            
            let church = select.value === '기타' ? otherInput.value : select.value;

            if(!email || !password || !name || !nickname || !church) { alert("모든 항목을 입력해주세요."); return; }
            if(!isChecked) { alert("아이디 중복확인을 완료해주세요."); return; }
            if(password !== passwordConfirm) { alert("비밀번호가 일치하지 않습니다."); return; }
            if(!agree) { alert("개인정보 이용 동의가 필요합니다."); return; }

            // 코드 입력 시 스태프(글쓰기 권한) 부여
            let role = (authCode === "staff123") ? "staff" : "user";

            try {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, "users", cred.user.uid), {
                    email, name, nickname, church, role,
                    createdAt: new Date().toISOString()
                });
                alert(role === "staff" ? "스태프 권한으로 가입되었습니다." : "가입을 환영합니다!");
                window.location.href = "login.html";
            } catch(e) { alert("가입 실패: " + e.message); }
        });

        document.getElementById('email').addEventListener('input', () => isChecked = false);
    </script>
</body>
</html>
