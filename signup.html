<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 | 대전대흥교회 청소년부</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-color: #add8e6;
            --primary-blue: #007bff;
            --footer-bg: #f8fbff;
            --text-main: #555;
            --border-color: #dee2e6;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(180deg, #ffffff 0%, var(--footer-bg) 100%);
        }

        body { display: flex; justify-content: center; align-items: center; }

        .signup-container {
            width: 100%;
            max-width: 700px;
            padding: 50px 40px;
            background: #ffffff;
            border-top: 4px solid var(--main-color);
            box-shadow: 0 15px 35px rgba(0,0,0,0.07);
            border-radius: 0 0 20px 20px;
        }

        header { text-align: center; margin-bottom: 40px; }
        header h1 { font-size: 2.2rem; font-weight: 900; color: var(--primary-blue); margin: 0; }
        header p { font-size: 1rem; color: var(--text-main); margin-top: 10px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px 35px; }
        .field.full { grid-column: span 2; }

        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        label { font-size: 0.9rem; font-weight: 700; color: #333; }

        .optional-tag { font-size: 0.75rem; color: #aaa; font-weight: 400; margin-left: 5px; }

        input, select {
            width: 100%;
            padding: 12px 0;
            border: none;
            border-bottom: 1.5px solid var(--border-color);
            font-size: 1rem;
            background: transparent;
            transition: all 0.3s;
        }

        input:focus, select:focus { outline: none; border-bottom: 2px solid var(--main-color); }

        /* 출석교회 입력 영역 */
        .church-select-group { display: flex; gap: 15px; align-items: flex-end; }
        #other-church-input { display: none; } /* 기본적으로 숨김 */

        .privacy-box {
            grid-column: span 2;
            background: var(--footer-bg);
            padding: 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #666;
            height: 80px;
            overflow-y: auto;
            border: 1px solid #eee;
        }

        .agreement-row {
            grid-column: span 2;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
        }

        .submit-btn {
            grid-column: span 2;
            padding: 18px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
        }

        .nav-links {
            grid-column: span 2;
            text-align: center;
            margin-top: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .nav-links a { color: #888; text-decoration: none; font-size: 0.9rem; }
        .divider { width: 1px; height: 12px; background-color: #ccc; }
    </style>
</head>
<body>

    <div class="signup-container">
        <header>
            <h1>대전대흥교회 청소년부</h1>
            <p>공동체의 일원이 되신 것을 환영합니다.</p>
        </header>

        <div class="form-grid">
            <div class="field full">
                <div class="label-row">
                    <label>아이디 (이메일)</label>
                    <button type="button" style="font-size: 0.8rem; color: var(--primary-blue); background:none; border:1px solid var(--primary-blue); padding:2px 8px; border-radius:4px; cursor:pointer;" id="check-id">중복확인</button>
                </div>
                <input type="email" id="email" placeholder="이메일을 입력해주세요" required>
            </div>

            <div class="field">
                <label>비밀번호</label>
                <input type="password" id="password" placeholder="6자리 이상" required>
            </div>
            <div class="field">
                <label>비밀번호 재확인</label>
                <input type="password" id="password-confirm" placeholder="동일하게 입력" required>
            </div>

            <div class="field">
                <label>이름</label>
                <input type="text" id="name" placeholder="실명 입력" required>
            </div>
            <div class="field">
                <label>닉네임</label>
                <input type="text" id="nickname" placeholder="닉네임 입력" required>
            </div>

            <div class="field full">
                <label>출석 교회</label>
                <div class="church-select-group">
                    <select id="church-select">
                        <option value="대전대흥교회" selected>대전대흥교회</option>
                        <option value="기타">기타 (직접 입력)</option>
                    </select>
                    <input type="text" id="other-church-input" placeholder="교회 이름을 입력해주세요">
                </div>
            </div>

            <div class="field full">
                <label>관리자 인증코드<span class="optional-tag">(선택항목: 관리자 가입 시에만 입력)</span></label>
                <input type="text" id="admin-code" placeholder="인증코드를 입력하면 관리자 권한이 부여됩니다">
            </div>

            <div class="privacy-box">
                <strong>개인정보 수집 및 이용 안내</strong><br>
                수집항목: 이메일, 이름, 닉네임, 출석교회 / 보유기간: 회원 탈퇴 시까지
            </div>

            <div class="agreement-row">
                <span style="font-size:0.9rem;">개인정보 이용에 동의합니다.</span>
                <input type="checkbox" id="agree" style="width:18px; height:18px; cursor:pointer;">
            </div>

            <button id="signup-btn" class="submit-btn">가입하기</button>

            <div class="nav-links">
                <a href="index.html">홈페이지로 돌아가기</a>
                <span class="divider"></span>
                <a href="login.html">로그인 하기</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, fetchSignInMethodsForEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAp8majwjPetRnK5u9f_agOWEcW2_veBdw",
            authDomain: "dhchurch-cf85f.firebaseapp.com",
            projectId: "dhchurch-cf85f",
            storageBucket: "dhchurch-cf85f.firebasestorage.app",
            messagingSenderId: "718998916531",
            appId: "1:718998916531:web:6d5641ed5a404c2ee0cfc6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isChecked = false;

        // 교회 선택 이벤트 (기타 선택 시 입력칸 표시)
        const churchSelect = document.getElementById('church-select');
        const otherInput = document.getElementById('other-church-input');
        churchSelect.addEventListener('change', (e) => {
            otherInput.style.display = e.target.value === '기타' ? 'block' : 'none';
        });

        // 아이디 중복확인
        document.getElementById('check-id').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            if(!email) { alert("이메일을 입력해주세요."); return; }
            try {
                const methods = await fetchSignInMethodsForEmail(auth, email);
                if(methods.length > 0) { alert("이미 가입된 아이디입니다."); isChecked = false; }
                else { alert("사용 가능한 아이디입니다."); isChecked = true; }
            } catch(e) { alert("중복확인 오류가 발생했습니다."); }
        });

        document.getElementById('signup-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password-confirm').value;
            const name = document.getElementById('name').value;
            const nickname = document.getElementById('nickname').value;
            const adminCode = document.getElementById('admin-code').value;
            const agree = document.getElementById('agree').checked;
            
            // 출석교회 값 결정
            let finalChurch = churchSelect.value === '기타' ? otherInput.value : churchSelect.value;

            if(!email || !password || !name || !nickname || !finalChurch) { alert("필수 항목을 모두 입력해주세요."); return; }
            if(!isChecked) { alert("아이디 중복확인을 해주세요."); return; }
            if(password !== passwordConfirm) { alert("비밀번호가 다릅니다."); return; }
            if(!agree) { alert("개인정보 이용에 동의해주세요."); return; }

            // 권한 설정 (코드가 맞으면 admin, 아니면 user)
            const userRole = (adminCode === "1234") ? "admin" : "user";

            try {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, "users", cred.user.uid), {
                    email, name, nickname, 
                    churchName: finalChurch,
                    role: userRole,
                    createdAt: new Date().toISOString()
                });
                alert(userRole === "admin" ? "관리자 계정으로 가입되었습니다." : "가입을 진심으로 환영합니다");
                window.location.href = "login.html";
            } catch(e) { alert("가입 실패: " + e.message); }
        });
    </script>
</body>
</html>
