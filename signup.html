<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 | DH Church</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007bff;
            --primary-dark: #0056b3;
            --bg-gray: #f8f9fa;
            --text-main: #212529;
            --text-sub: #6c757d;
            --border: #dee2e6;
            --white: #ffffff;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-gray);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 상단 네비게이션 느낌의 여백 */
        .header-spacer {
            height: 60px;
        }

        .signup-wrapper {
            width: 100%;
            max-width: 500px; /* 일반적인 회원가입 폼 너비 */
            background: var(--white);
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            margin-bottom: 50px;
        }

        .signup-wrapper h2 {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .signup-wrapper p.desc {
            text-align: center;
            color: var(--text-sub);
            margin-bottom: 40px;
            font-size: 0.95rem;
        }

        .form-section {
            margin-bottom: 25px;
        }

        .form-section label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s;
            background-color: #fff;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 123, 255, 0.1);
        }

        /* 개인정보 동의 영역 */
        .agreement-box {
            background-color: #f1f3f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 0.85rem;
            color: var(--text-sub);
            border: 1px solid var(--border);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-weight: 500;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* 버튼 그룹 */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 30px;
        }

        .btn-submit {
            padding: 16px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-submit:hover {
            background-color: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-home {
            padding: 14px;
            background-color: transparent;
            color: var(--text-sub);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-decoration: none;
            text-align: center;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .btn-home:hover {
            background-color: #f8f9fa;
            color: var(--text-main);
        }

        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-sub);
        }

        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="header-spacer"></div>

    <div class="signup-wrapper">
        <h2>회원가입</h2>
        <p class="desc">서비스 이용을 위해 회원정보를 입력해주세요.</p>

        <div class="form-section">
            <label for="email">아이디 (이메일)</label>
            <input type="email" id="email" placeholder="이메일 주소를 입력하세요" required>
        </div>

        <div class="form-section">
            <label for="password">비밀번호</label>
            <input type="password" id="password" placeholder="6자리 이상 비밀번호" required>
        </div>

        <div class="form-section">
            <label for="name">이름</label>
            <input type="text" id="name"
