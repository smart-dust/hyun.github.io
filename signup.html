<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | 대전대흥교회 청소년부</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-color: #007aff;
            --bg-color: #ffffff;
            --input-bg: #f9f9fb;
            --text-black: #1d1d1f;
            --text-gray: #86868b;
            --border-color: #d2d2d7;
            --error-red: #ff3b30;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            margin: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-black);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .signup-wrapper {
            width: 100%;
            max-width: 680px;
            padding: 80px 40px; /* 상하 여백 대폭 확대 */
        }

        header {
            text-align: center;
            margin-bottom: 80px;
        }

        header h1 {
            font-size: 3.2rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -2px;
        }

        header p {
            font-size: 1.25rem;
            color: var(--text-gray);
            margin-top: 20px;
            font-weight: 300;
        }

        .form-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px 30px; /* 필드 간 간격 확대 */
        }

        .field.full { grid-column: span 2; }

        .field-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        label {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-black);
        }

        .check-btn {
            font-size: 0.85rem;
            color: var(--accent-color);
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            padding: 0;
            transition: opacity 0.2s;
        }

        .check-btn:hover { opacity: 0.7; }

        input {
            width: 100%;
            padding: 18px 20px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 1.05rem;
            background-color: var(--input-bg);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
        }

        /* 개인정보 상세 약관 영역 */
        .privacy-content {
            grid-column: span 2;
            margin-top: 20px;
            background: #f5f5f7;
            padding: 25px;
            border-radius: 14px;
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--text-gray);
            height: 120px;
            overflow-y: auto;
        }

        .privacy-content strong { color: var(--text-black); }

        .agreement-row {
            grid-column: span 2;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
        }

        .agreement-row span { font-size: 1rem; font-weight: 500; }

        .agreement-row input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        /* 제출 버튼 */
        .submit-btn {
            grid-column: span 2;
            padding: 22px;
            background-color: var(--text-black);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.25rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 40px;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            background-color: #333;
            transform: translateY(-2px);
        }

        .footer-nav {
            grid-column: span 2;
            text-align: center;
            margin-top: 50px;
        }

        .footer-nav a {
            color: var(--text-gray);
            text-decoration: none;
            font-size: 1rem;
            margin: 0 20px;
            transition: color 0.2s;
        }

        .footer-nav a:hover { color: var(--accent-color); }

        /* 스크롤바 커스텀 */
        .privacy-content::-webkit-scrollbar { width: 4px; }
        .privacy-content::-webkit-scrollbar-thumb { background: #d2d2d7; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="signup-wrapper">
        <header>
            <h1>Create Account</h1>
            <p>대전대흥교회 청소년부 멤버십 가입을 시작해주세요.</p>
        </header>

        <div class="form-section">
            <div class="field full">
                <div class="field-header">
                    <label>아이디 (이메일)</label>
                    <button type="button" class="check-btn" id="check-duplicate">중복확인</button>
                </div>
                <input type="email" id="email" placeholder="example@email.com" required>
            </div>

            <div class="field">
                <label>비밀번호</label>
                <input type="password" id="password" placeholder="6자리 이상 입력해주세요" required>
            </div>
            <div class="field">
                <label>비밀번호 재확인</label>
                <input type="password" id="password-confirm" placeholder="한 번 더 입력해주세요" required>
            </div>

            <div class="field">
                <label>이름</label>
                <input type="text" id="name" placeholder="실명을 입력해주세요" required>
            </div>
            <div class="field">
                <label>닉네임</label>
                <input type="text" id="nickname" placeholder="닉네임을 입력해주세요" required>
            </div>

            <div class="field full">
                <label>교회코드</label>
                <input type="text" id="church-code" placeholder="전달받으신 코드를 입력해주세요" required>
            </div>

            <div class="privacy-content">
                <strong>개인정보 수집 및 이용 동의</strong><br>
                1. 수집 항목: 이름, 닉네임, 이메일 주소, 소속 교회 정보<br>
                2. 수집 목적: 회원 식별, 청소년부 서비스 제공 및 공지사항 전달, 교회 내 활동 기록 관리<br>
                3. 보유 기간: 회원 탈퇴 시까지 또는 서비스 종료 시까지 보관하며 이후 즉시 파기합니다.<br>
                4. 권리: 귀하는 개인정보 수집에 거부할 권리가 있으나, 거부 시 서비스 이용이 제한될 수 있습니다.
            </div>

            <div class="agreement-row">
                <span>개인정보 수집 및 이용에 동의합니다.</span>
                <input type="checkbox" id="agree">
            </div>

            <button id="signup-btn" class="submit-btn">가입하기</button>

            <div class="footer-nav">
                <a href="index.html">홈페이지로 돌아가기</a>
                <a href="login.html">로그인 하기</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, fetchSignInMethodsForEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAp8majwjPetRnK5u9f_agOWEcW2_veBdw",
            authDomain: "dhchurch-cf85f.firebaseapp.com",
            projectId: "dhchurch-cf85f",
            storageBucket: "dhchurch-cf85f.firebasestorage.app",
            messagingSenderId: "718998916531",
            appId: "1:718998916531:web:6d5641ed5a404c2ee0cfc6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isEmailChecked = false;

        // 아이디 중복 확인 로직
        document.getElementById('check-duplicate').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            if(!email) { alert("이메일을 입력해주세요."); return; }
            
            try {
                const methods = await fetchSignInMethodsForEmail(auth, email);
                if (methods.length > 0) {
                    alert("이미 사용 중인 아이디입니다.");
                    isEmailChecked = false;
                } else {
                    alert("사용 가능한 아이디입니다.");
                    isEmailChecked = true;
                }
            } catch (e) {
                alert("확인 중 오류가 발생했습니다.");
            }
        });

        document.getElementById('signup-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password-confirm').value;
            const name = document.getElementById('name').value;
            const nickname = document.getElementById('nickname').value;
            const churchCode = document.getElementById('church-code').value;
            const agree = document.getElementById('agree').checked;

            if (!email || !password || !name || !nickname || !churchCode) { alert("모든 항목을 입력해주세요."); return; }
            if (!isEmailChecked) { alert("아이디 중복확인을 진행해주세요."); return; }
            if (password !== passwordConfirm) { alert("비밀번호가 일치하지 않습니다."); return; }
            if (!agree) { alert("개인정보 수집 및 이용에 동의해주세요."); return; }
            if (churchCode !== "1234") { alert("교회코드를 입력해주세요."); return; }

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, "users", userCredential.user.uid), {
                    email, name, nickname, churchMember: true, createdAt: new Date().toISOString()
                });
                alert("대전대흥교회 청소년부 가입을 진심으로 환영합니다");
                window.location.href = "login.html";
            } catch (e) {
                alert("가입 에러: " + e.message);
            }
        });

        // 이메일 입력값 변경 시 중복확인 초기화
        document.getElementById('email').addEventListener('input', () => { isEmailChecked = false; });
    </script>
</body>
</html>
