<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 | 대전대흥교회 청소년부</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Nanum+Myeongjo:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #007bff;
            --dark-blue: #0056b3;
            --border-color: #dee2e6;
            --text-main: #212529;
            --text-sub: #6c757d;
        }

        /* 1080*1920 해상도에서 스크롤 없이 중앙 배치 */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #ffffff;
            color: var(--text-main);
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #fcfdfe 0%, #ffffff 100%);
        }

        .container {
            width: 100%;
            max-width: 600px; /* 너무 커지지 않도록 너비 제한 */
            padding: 0 20px;
            box-sizing: border-box;
        }

        .bible-verse {
            font-family: 'Nanum Myeongjo', serif;
            font-size: 0.95rem;
            color: var(--primary-blue);
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 900;
            margin: 0;
            color: var(--text-main);
            letter-spacing: -1.5px;
        }

        header p {
            font-size: 1rem;
            color: var(--text-sub);
            margin-top: 8px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 30px;
        }

        .field.full { grid-column: span 2; }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        input {
            width: 100%;
            padding: 12px 0;
            border: none;
            border-bottom: 1.5px solid var(--border-color);
            font-size: 1rem;
            background: transparent;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-bottom: 2px solid var(--primary-blue);
        }

        /* 개인정보 동의 - 문구 우측 밀착형 */
        .agreement-area {
            grid-column: span 2;
            display: flex;
            justify-content: flex-end; /* 우측 정렬 */
            align-items: center;
            gap: 10px; /* 문구와 체크박스 사이 아주 좁은 간격 */
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #f8f9fa;
        }

        .agreement-area span {
            font-size: 0.9rem;
            color: #444;
            font-weight: 500;
        }

        .agreement-area input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary-blue);
        }

        /* 버튼 디자인 고급화 */
        .btn-submit {
            grid-column: span 2;
            padding: 18px;
            margin-top: 25px;
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--dark-blue) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 123, 255, 0.3);
        }

        /* 하단 링크 효과 */
        .nav-links {
            grid-column: span 2;
            text-align: center;
            margin-top: 30px;
        }

        .nav-links a {
            color: #adb5bd;
            text-decoration: none;
            font-size: 0.9rem;
            margin: 0 15px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary-blue);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="bible-verse">“너의 행사를 여호와께 맡기라 그리하면 네가 경영하는 것이 이루어지리라”</div>
        
        <header>
            <h1>회원가입</h1>
            <p>대전대흥교회 청소년부의 가족이 되어주세요.</p>
        </header>

        <div class="form-grid">
            <div class="field full">
                <label>아이디 (이메일)</label>
                <input type="email" id="email" placeholder="사용하실 이메일을 입력해주세요" required>
            </div>

            <div class="field">
                <label>비밀번호</label>
                <input type="password" id="password" placeholder="6자리 이상 입력해주세요" required>
            </div>
            <div class="field">
                <label>비밀번호 재확인</label>
                <input type="password" id="password-confirm" placeholder="동일하게 입력해주세요" required>
            </div>

            <div class="field">
                <label>이름</label>
                <input type="text" id="name" placeholder="실명을 입력해주세요" required>
            </div>
            <div class="field">
                <label>닉네임</label>
                <input type="text" id="nickname" placeholder="닉네임을 입력해주세요" required>
            </div>

            <div class="field full">
                <label>교회코드</label>
                <input type="text" id="church-code" placeholder="전달받으신 교회코드를 입력해주세요" required>
            </div>

            <div class="agreement-area">
                <span>개인정보 수집 및 이용에 동의합니다.</span>
                <input type="checkbox" id="agree">
            </div>

            <button id="signup-btn" class="btn-submit">가입하기</button>

            <div class="nav-links">
                <a href="index.html">홈페이지로 돌아가기</a>
                <a href="login.html">로그인 하기</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAp8majwjPetRnK5u9f_agOWEcW2_veBdw",
            authDomain: "dhchurch-cf85f.firebaseapp.com",
            projectId: "dhchurch-cf85f",
            storageBucket: "dhchurch-cf85f.firebasestorage.app",
            messagingSenderId: "718998916531",
            appId: "1:718998916531:web:6d5641ed5a404c2ee0cfc6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('signup-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password-confirm').value;
            const name = document.getElementById('name').value;
            const nickname = document.getElementById('nickname').value;
            const churchCode = document.getElementById('church-code').value;
            const agree = document.getElementById('agree').checked;

            if (!email || !password || !name || !nickname || !churchCode) { 
                alert("모든 필수 항목을 입력해주세요."); 
                return; 
            }
            if (password !== passwordConfirm) { 
                alert("비밀번호가 일치하지 않습니다."); 
                return; 
            }
            if (!agree) { 
                alert("개인정보 수집 및 이용에 동의해주세요."); 
                return; 
            }
            if (churchCode !== "1234") { 
                alert("교회코드를 입력해주세요."); 
                return; 
            }

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, "users", userCredential.user.uid), {
                    email, name, nickname, churchMember: true, createdAt: new Date().toISOString()
                });
                alert("대전대흥교회 청소년부 가입을 진심으로 환영합니다");
                window.location.href = "login.html";
            } catch (e) {
                alert("가입 중 오류가 발생했습니다: " + e.message);
            }
        });
    </script>
</body>
</html>
