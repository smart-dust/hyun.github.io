<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 | 대전대흥교회 청소년부</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-color: #add8e6; 
            --primary-blue: #007bff;
            --footer-bg: #f8fbff; 
            --text-main: #212529;
            --text-sub: #6c757d;
            --border-color: #dee2e6;
        }

        /* 1080*1920 기준 스크롤 억제 */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #ffffff;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 40px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-section h1 {
            font-size: 2.3rem;
            font-weight: 900;
            color: var(--primary-blue);
            margin: 0;
            letter-spacing: -1.5px;
        }

        .header-section p {
            color: var(--text-sub);
            margin-top: 8px;
            font-size: 1.05rem;
        }

        .signup-form {
            width: 100%;
            max-width: 650px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px 30px;
        }

        .field.full { grid-column: span 2; }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        input {
            width: 100%;
            padding: 10px 0;
            border: none;
            border-bottom: 1.5px solid var(--border-color);
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
            background-color: transparent;
        }

        input:focus {
            outline: none;
            border-bottom: 2px solid var(--primary-blue);
        }

        .agreement-box {
            grid-column: span 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            margin-top: 5px;
        }

        .agreement-box span { font-size: 0.9rem; font-weight: 500; color: #555; }
        .agreement-box input[type="checkbox"] { width: 19px; height: 19px; cursor: pointer; }

        .submit-btn {
            grid-column: span 2;
            padding: 16px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        .submit-btn:hover { background-color: #0056b3; }

        .sub-nav {
            grid-column: span 2;
            text-align: center;
            margin-top: 12px;
        }

        .sub-nav a {
            color: #aaa;
            text-decoration: none;
            font-size: 0.85rem;
            margin: 0 10px;
        }

        /* 주신 Footer 코드 적용 */
        .footer {
            background: var(--footer-bg);
            color: #555;
            padding: 35px 20px;
            text-align: center;
            border-top: 2.5px solid var(--main-color);
        }

        .footer p {
            margin: 5px 0;
            font-size: 13.5px;
            line-height: 1.5;
            color: #666;
        }

        .footer-copy {
            margin-top: 15px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-section">
            <h1>대전대흥교회 청소년부</h1>
            <p>신규 회원가입을 위해 정보를 입력해주세요.</p>
        </div>

        <div class="signup-form">
            <div class="field full">
                <label>아이디 (이메일)</label>
                <input type="email" id="email" placeholder="이메일 주소를 입력해주세요" required>
            </div>

            <div class="field">
                <label>비밀번호</label>
                <input type="password" id="password" placeholder="6자리 이상 입력해주세요" required>
            </div>
            <div class="field">
                <label>비밀번호 재확인</label>
                <input type="password" id="password-confirm" placeholder="한 번 더 입력해주세요" required>
            </div>

            <div class="field">
                <label>이름</label>
                <input type="text" id="name" placeholder="실명을 입력해주세요" required>
            </div>
            <div class="field">
                <label>닉네임</label>
                <input type="text" id="nickname" placeholder="닉네임을 입력해주세요" required>
            </div>

            <div class="field full">
                <label>교회코드</label>
                <input type="text" id="church-code" placeholder="발급받으신 교회코드를 입력해주세요" required>
            </div>

            <div class="agreement-box">
                <span>개인정보 수집 및 이용에 동의합니다.</span>
                <input type="checkbox" id="agree">
            </div>

            <button id="signup-btn" class="btn-submit">가입하기</button>

            <div class="sub-nav">
                <a href="index.html">홈페이지로 돌아가기</a>
                <a href="login.html">로그인 하러가기</a>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>주소: 대전광역시 중구 충무로 11번길 43 (교육선교관 2층)</p>
        <p>전화: 042-123-4567 | 이메일: youth@dhchurch.org</p>
        <p class="footer-copy">© 2026 대전대흥교회 청소년부. All rights reserved.</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAp8majwjPetRnK5u9f_agOWEcW2_veBdw",
            authDomain: "dhchurch-cf85f.firebaseapp.com",
            projectId: "dhchurch-cf85f",
            storageBucket: "dhchurch-cf85f.firebasestorage.app",
            messagingSenderId: "718998916531",
            appId: "1:718998916531:web:6d5641ed5a404c2ee0cfc6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('signup-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password-confirm').value;
            const name = document.getElementById('name').value;
            const nickname = document.getElementById('nickname').value;
            const churchCode = document.getElementById('church-code').value;
            const agree = document.getElementById('agree').checked;

            if (!email || !password || !name || !nickname || !churchCode) { 
                alert("모든 항목을 입력해주세요."); 
                return; 
            }
            if (password !== passwordConfirm) { 
                alert("비밀번호가 일치하지 않습니다."); 
                return; 
            }
            if (!agree) { 
                alert("개인정보 수집 및 이용에 동의해주세요."); 
                return; 
            }
            if (churchCode !== "1234") { 
                alert("교회코드를 입력해주세요."); 
                return; 
            }

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, "users", userCredential.user.uid), {
                    email, name, nickname, churchMember: true, createdAt: new Date().toISOString()
                });
                alert("대전대흥교회 청소년부 가입을 진심으로 환영합니다");
                window.location.href = "login.html";
            } catch (e) {
                alert("가입 실패: " + e.message);
            }
        });
    </script>
</body>
</html>
