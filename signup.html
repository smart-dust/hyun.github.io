<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 | 대전대흥교회 청소년부</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #007bff;
            --text-dark: #1d1d1f;
            --text-gray: #6e6e73;
            --border-color: #d2d2d7;
            --input-bg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #ffffff; 
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 80px 20px;
        }

        .container {
            width: 100%;
            max-width: 640px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        header h1 {
            font-size: 2.6rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            margin-bottom: 15px;
        }

        header p {
            font-size: 1.15rem;
            color: var(--text-gray);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 35px 30px;
        }

        .field.full { grid-column: span 2; }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; gap: 25px; }
            .field { grid-column: span 2; }
            header h1 { font-size: 2rem; }
            body { padding: 40px 20px; }
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        label {
            font-size: 0.95rem;
            font-weight: 700;
        }

        .check-btn {
            font-size: 0.8rem;
            color: var(--primary-blue);
            background: none;
            border: 1px solid var(--primary-blue);
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        .check-btn:hover { background: var(--primary-blue); color: #fff; }

        input, select {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            background: var(--input-bg);
            transition: all 0.2s;
            -webkit-appearance: none;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 4px rgba(0, 123, 255, 0.1);
        }

        /* 셀렉트 박스 디자인 및 화살표 위치 교정 */
        .select-wrapper {
            position: relative;
        }
        .select-wrapper::after {
            content: "▼";
            font-size: 0.7rem;
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            pointer-events: none;
        }

        #other-church-input { margin-top: 12px; display: none; }

        /* 개인정보 처리방침 상자 */
        .privacy-box {
            grid-column: span 2;
            background: #f9f9fb;
            padding: 22px;
            border-radius: 12px;
            font-size: 0.88rem;
            line-height: 1.7;
            color: var(--text-gray);
            height: 140px;
            overflow-y: auto;
            border: 1px solid #eee;
            margin-top: 10px;
        }

        /* 체크박스 영역: 텍스트 클릭 불가 설정 */
        .agreement-row {
            grid-column: span 2;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            padding: 15px 0;
        }
        
        .agreement-text {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-dark);
            user-select: none; /* 텍스트 선택/클릭 방지 강조 */
            cursor: default;   /* 화살표 커서로 고정 */
        }

        .agreement-row input[type="checkbox"] {
            width: 24px;
            height: 24px;
            cursor: pointer; /* 오직 여기서만 손가락 커서 */
            accent-color: var(--primary-blue);
        }

        .submit-btn {
            grid-column: span 2;
            padding: 22px;
            background-color: #111;
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 25px;
            transition: 0.2s;
        }
        .submit-btn:hover { background-color: #000; transform: translateY(-2px); }

        .nav-links {
            grid-column: span 2;
            text-align: center;
            margin-top: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
        .nav-links a { color: var(--text-gray); text-decoration: none; font-size: 0.95rem; }
        .divider { width: 1px; height: 12px; background-color: var(--border-color); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>대전대흥교회 청소년부</h1>
            <p>대전대흥교회 청소년부에 오신걸 환영합니다</p>
        </header>

        <div class="form-grid">
            <div class="field full">
                <div class="label-row">
                    <label>아이디 (이메일)</label>
                    <button type="button" class="check-btn" id="check-id">중복확인</button>
                </div>
                <input type="email" id="email" placeholder="example@email.com" required>
            </div>

            <div class="field">
                <label>비밀번호</label>
                <input type="password" id="password" placeholder="6자리 이상 입력" required>
            </div>
            <div class="field">
                <label>비밀번호 재확인</label>
                <input type="password" id="password-confirm" placeholder="동일하게 입력" required>
            </div>

            <div class="field">
                <label>이름</label>
                <input type="text" id="name" placeholder="실명을 입력해주세요" required>
            </div>
            <div class="field">
                <label>닉네임</label>
                <input type="text" id="nickname" placeholder="사용할 닉네임" required>
            </div>

            <div class="field full">
                <label>출석 교회</label>
                <div class="select-wrapper">
                    <select id="church-select">
                        <option value="대전대흥교회">대전대흥교회</option>
                        <option value="기타">기타 (직접 입력)</option>
                    </select>
                </div>
                <input type="text" id="other-church-input" placeholder="교회 이름을 직접 입력해주세요">
            </div>

            <div class="field full">
                <label>교회코드 <span style="font-weight:400; color:var(--text-gray); font-size:0.8rem;">(대전대흥교회 청소년부일 경우 입력)</span></label>
                <input type="text" id="auth-code" placeholder="코드를 입력해주세요">
            </div>

            <div class="privacy-box">
                <strong>개인정보 수집 및 이용 동의 (필수)</strong>
                대전대흥교회 청소년부는 회원 서비스 제공을 위해 아래와 같이 개인정보를 수집합니다.<br><br>
                1. 수집항목: 이메일, 이름, 닉네임, 소속교회 정보<br>
                2. 수집목적: 사용자 식별, 공동체 서비스 이용 및 게시판 권한 부여<br>
                3. 보유기간: 회원 탈퇴 시 즉시 파기<br>
                귀하는 동의를 거부할 권리가 있으며, 거부 시 서비스 이용이 제한될 수 있음을 안내드립니다.
            </div>

            <div class="agreement-row">
                <span class="agreement-text">개인정보 수집 및 이용에 동의합니다.</span>
                <input type="checkbox" id="agree">
            </div>

            <button id="signup-btn" class="submit-btn">가입 완료하기</button>

            <div class="nav-links">
                <a href="index.html">홈페이지로 돌아가기</a>
                <span class="divider"></span>
                <a href="login.html">로그인 하기</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, fetchSignInMethodsForEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAp8majwjPetRnK5u9f_agOWEcW2_veBdw",
            authDomain: "dhchurch-cf85f.firebaseapp.com",
            projectId: "dhchurch-cf85f",
            storageBucket: "dhchurch-cf85f.firebasestorage.app",
            messagingSenderId: "718998916531",
            appId: "1:718998916531:web:6d5641ed5a404c2ee0cfc6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isChecked = false;

        const select = document.getElementById('church-select');
        const otherInput = document.getElementById('other-church-input');
        select.addEventListener('change', (e) => {
            otherInput.style.display = e.target.value === '기타' ? 'block' : 'none';
        });

        document.getElementById('check-id').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            if(!email) { alert("이메일을 입력해주세요."); return; }
            try {
                const methods = await fetchSignInMethodsForEmail(auth, email);
                if(methods.length > 0) { alert("이미 사용 중인 아이디입니다."); isChecked = false; }
                else { alert("사용 가능한 아이디입니다."); isChecked = true; }
            } catch(e) { alert("오류가 발생했습니다."); }
        });

        document.getElementById('signup-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password-confirm').value;
            const name = document.getElementById('name').value;
            const nickname = document.getElementById('nickname').value;
            const authCode = document.getElementById('auth-code').value;
            const agree = document.getElementById('agree').checked;
            
            let church = select.value === '기타' ? otherInput.value : select.value;

            if(!email || !password || !name || !nickname || !church) { alert("모든 항목을 입력해주세요."); return; }
            if(!isChecked) { alert("아이디 중복확인을 완료해주세요."); return; }
            if(password !== passwordConfirm) { alert("비밀번호가 일치하지 않습니다."); return; }
            if(!agree) { alert("개인정보 이용 동의가 필요합니다."); return; }

            let role = (authCode === "staff123") ? "staff" : "user";

            try {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, "users", cred.user.uid), {
                    email, name, nickname, church, role,
                    createdAt: new Date().toISOString()
                });
                alert("대전대흥교회 청소년부에 오신걸 환영합니다");
                window.location.href = "login.html";
            } catch(e) { alert("가입 실패: " + e.message); }
        });

        document.getElementById('email').addEventListener('input', () => isChecked = false);
    </script>
</body>
</html>
