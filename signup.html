<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 | 대전대흥교회 청소년부</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #007bff;
            --dark-blue: #0056b3;
            --text-main: #212529;
            --text-sub: #6c757d;
            --line-color: #dee2e6;
            --bg-color: #ffffff;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 상단 브랜드 헤더 */
        .brand-header {
            width: 100%;
            max-width: 700px;
            padding: 60px 20px 40px;
            text-align: center;
        }

        .brand-header h1 {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--primary-blue);
            margin: 0;
            letter-spacing: -1.5px;
        }

        .brand-header p {
            font-size: 1.1rem;
            color: var(--text-sub);
            margin-top: 10px;
            font-weight: 500;
        }

        /* 메인 폼 영역 */
        .signup-content {
            width: 100%;
            max-width: 700px;
            padding: 0 20px 100px;
            box-sizing: border-box;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--text-main);
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px 30px;
        }

        .field.full {
            grid-column: span 2;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            padding: 14px 0;
            border: none;
            border-bottom: 1px solid var(--line-color);
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
            background-color: transparent;
        }

        input:focus {
            outline: none;
            border-bottom: 2px solid var(--primary-blue);
        }

        input::placeholder {
            color: #adb5bd;
            font-size: 0.9rem;
        }

        /* 동의 섹션 */
        .agreement-row {
            grid-column: span 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding: 20px 0;
            border-top: 1px solid var(--line-color);
        }

        .agreement-row span {
            font-size: 0.95rem;
            font-weight: 500;
        }

        .agreement-row input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin: 0;
            cursor: pointer;
        }

        /* 버튼 영역 */
        .action-btns {
            grid-column: span 2;
            margin-top: 40px;
            text-align: center;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
        }

        .submit-btn:hover {
            background-color: var(--dark-blue);
        }

        .sub-links {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .sub-links a {
            color: var(--text-sub);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .sub-links a:hover {
            color: var(--text-main);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header class="brand-header">
        <h1>대전대흥교회 청소년부</h1>
        <p>함께 성장하는 신앙 공동체에 오신 것을 환영합니다.</p>
    </header>

    <main class="signup-content">
        <div class="section-title">회원정보 입력</div>
        
        <div class="form-grid">
            <div class="field full">
                <label>아이디 (이메일)</label>
                <input type="email" id="email" placeholder="사용하실 이메일 주소를 입력해주세요" required>
            </div>

            <div class="field">
                <label>비밀번호</label>
                <input type="password" id="password" placeholder="6자리 이상 입력해주세요" required>
            </div>
            <div class="field">
                <label>비밀번호 재확인</label>
                <input type="password" id="password-confirm" placeholder="한 번 더 입력해주세요" required>
            </div>

            <div class="field">
                <label>이름</label>
                <input type="text" id="name" placeholder="실명을 입력해주세요" required>
            </div>
            <div class="field">
                <label>닉네임</label>
                <input type="text" id="nickname" placeholder="닉네임을 입력해주세요" required>
            </div>

            <div class="field full">
                <label>교회코드</label>
                <input type="text" id="church-code" placeholder="발급받으신 교회코드를 입력해주세요" required>
            </div>

            <div class="agreement-row">
                <span>개인정보 수집 및 이용에 동의합니다.</span>
                <input type="checkbox" id="agree">
            </div>

            <div class="action-btns">
                <button id="signup-btn" class="submit-btn">가입하기</button>
                <div class="sub-links">
                    <a href="index.html">홈페이지로 돌아가기</a>
                    <a href="login.html">로그인 페이지</a>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAp8majwjPetRnK5u9f_agOWEcW2_veBdw",
            authDomain: "dhchurch-cf85f.firebaseapp.com",
            projectId: "dhchurch-cf85f",
            storageBucket: "dhchurch-cf85f.firebasestorage.app",
            messagingSenderId: "718998916531",
            appId: "1:718998916531:web:6d5641ed5a404c2ee0cfc6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const signupBtn = document.getElementById('signup-btn');

        signupBtn.addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password-confirm').value;
            const name = document.getElementById('name').value;
            const nickname = document.getElementById('nickname').value;
            const churchCode = document.getElementById('church-code').value;
            const agree = document.getElementById('agree').checked;

            if (!email || !password || !name || !nickname || !churchCode) {
                alert("모든 필수 항목을 입력해주세요.");
                return;
            }

            if (password !== passwordConfirm) {
                alert("비밀번호가 서로 일치하지 않습니다. 다시 확인해주세요.");
                return;
            }

            if (!agree) {
                alert("개인정보 이용 동의가 필요합니다.");
                return;
            }

            if (churchCode !== "1234") {
                alert("교회코드가 올바르지 않습니다. 다시 확인해주세요.");
                return;
            }

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                await setDoc(doc(db, "users", user.uid), {
                    email: email,
                    name: name,
                    nickname: nickname,
                    churchMember: true,
                    createdAt: new Date().toISOString()
                });

                alert("대전대흥교회 청소년부의 가족이 되신 것을 환영합니다!");
                window.location.href = "login.html";

            } catch (error) {
                if (error.code === 'auth/email-already-in-use') {
                    alert("이미 가입된 아이디입니다.");
                } else {
                    alert("가입 중 오류가 발생했습니다: " + error.message);
                }
            }
        });
    </script>
</body>
</html>
