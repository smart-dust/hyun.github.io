<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>회원가입 | 대전대흥교회 청소년부</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #007bff;
            --text-dark: #1d1d1f;
            --text-gray: #86868b;
            --border-color: #d2d2d7;
            --transition: all 0.25s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #ffffff;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            padding: 60px 20px;
        }

        .container { width: 100%; max-width: 580px; }

        header { text-align: center; margin-bottom: 45px; }
        header h1 { font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 8px; }
        header p { font-size: 1rem; color: var(--text-gray); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px 20px; }
        .field.full { grid-column: span 2; }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; gap: 20px; }
            .field { grid-column: span 2; }
            body { padding: 40px 15px; }
            header h1 { font-size: 1.8rem; }
            .submit-btn { padding: 16px; font-size: 1.1rem; }
        }

        /* 소제목 디자인 */
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        label { font-size: 0.95rem; font-weight: 800; position: relative; padding-left: 12px; }
        label::before {
            content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
            width: 3.5px; height: 14px; background-color: var(--primary-blue); border-radius: 2px;
        }
        /* 교회코드 보조문구 회색 변경 */
        .sub-text { font-weight: 400; color: #b0b0b5; font-size: 0.75rem; margin-left: 4px; }

        .check-btn {
            font-size: 0.75rem; color: var(--primary-blue); background: #fff;
            border: 1px solid var(--primary-blue); padding: 4px 10px; border-radius: 6px;
            cursor: pointer; transition: var(--transition);
        }
        .check-btn:hover { background: var(--primary-blue); color: #fff; }
        .check-btn.verified { border-color: #28a745; color: #28a745; cursor: default; }

        input, select {
            width: 100%; padding: 14px; border: 1px solid var(--border-color);
            border-radius: 10px; font-size: 1rem; background-color: #fff;
            transition: var(--transition); outline: none;
        }
        input:focus { border-color: var(--primary-blue); box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1); }

        /* 드롭다운 디자인 */
        .select-wrapper { position: relative; }
        .select-wrapper::after {
            content: '▼'; font-size: 0.65rem; color: #bbb; position: absolute;
            right: 15px; top: 50%; transform: translateY(-50%); pointer-events: none;
        }
        select { appearance: none; cursor: pointer; padding-right: 40px; }

        /* 약관 디자인 */
        .privacy-box {
            grid-column: span 2; background: #fbfbfd; padding: 20px;
            border-radius: 12px; font-size: 0.85rem; line-height: 1.7;
            color: #48484a; height: 150px; overflow-y: auto; border: 1px solid #f2f2f7; margin-top: 10px;
        }
        .privacy-box h4 { color: #1d1d1f; font-weight: 800; margin-bottom: 8px; }

        .agreement-row {
            grid-column: span 2; display: flex; justify-content: flex-end;
            align-items: center; gap: 10px; padding: 8px 0;
        }
        .agreement-text { font-size: 0.9rem; font-weight: 600; }
        input[type="checkbox"]#agree { width: 22px; height: 22px; cursor: pointer; accent-color: var(--primary-blue); }

        /* 버튼 및 링크 배치 최적화 */
        .submit-btn {
            grid-column: span 2; padding: 18px; background-color: #1a1a1a;
            color: white; border: none; border-radius: 12px; font-size: 1.15rem;
            font-weight: 700; cursor: pointer; margin-top: 15px; transition: var(--transition);
        }
        .submit-btn:hover { background-color: #000; transform: translateY(-1px); }

        .nav-links {
            grid-column: span 2; text-align: center; margin-top: 15px; /* 간격 대폭 축소 */
            display: flex; justify-content: center; align-items: center; gap: 12px;
        }
        .nav-links a { color: var(--text-gray); text-decoration: none; font-size: 0.85rem; font-weight: 500; }
        .nav-links a:hover { color: var(--primary-blue); }
        .divider { width: 1px; height: 10px; background-color: var(--border-color); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>대전대흥교회 청소년부</h1>
            <p>대전대흥교회 청소년부에 오신걸 환영합니다</p>
        </header>

        <div class="form-grid">
            <div class="field full">
                <div class="label-row">
                    <label>아이디 (이메일)</label>
                    <button type="button" class="check-btn" id="check-id">중복확인</button>
                </div>
                <input type="email" id="email" placeholder="example@email.com" required>
            </div>

            <div class="field">
                <label>비밀번호</label>
                <input type="password" id="password" placeholder="6자리 이상" required>
            </div>
            <div class="field">
                <label>비밀번호 확인</label>
                <input type="password" id="password-confirm" placeholder="동일 입력" required>
            </div>

            <div class="field">
                <label>이름</label>
                <input type="text" id="name" placeholder="실명 입력" required>
            </div>
            <div class="field">
                <label>닉네임</label>
                <input type="text" id="nickname" placeholder="닉네임" required>
            </div>

            <div class="field full">
                <label>출석 교회</label>
                <div class="select-wrapper">
                    <select id="church-select">
                        <option value="대전대흥교회">대전대흥교회</option>
                        <option value="기타">기타 (직접 입력)</option>
                    </select>
                </div>
                <input type="text" id="other-church-input" style="display:none; margin-top:10px;" placeholder="교회 이름을 입력해주세요">
            </div>

            <div class="field full">
                <label>교회코드<span class="sub-text">(대전대흥교회 청소년부일 경우 입력)</span></label>
                <input type="text" id="auth-code" placeholder="코드를 입력해주세요">
            </div>

            <div class="privacy-box">
                <h4>[개인정보 처리방침 및 이용약관]</h4>
                <p><strong>1. 개인정보 수집 목적 및 이용</strong>: 청소년부는 회원 식별, 공동체 관리, 서비스 개발 및 통계 분석을 위해 정보를 이용합니다.</p>
                <p><strong>2. 정보 공유 및 권리</strong>: 청소년부는 대전대흥교회 산하 기관으로, 모든 정보는 대전대흥교회와 공유되며 동등한 보호 권리를 가집니다.</p>
                <p><strong>3. 서비스 제한 고지</strong>: 재난 상황이나 교회 정책 결정 시 서비스 이용이 제한될 수 있습니다.</p>
            </div>

            <div class="agreement-row">
                <span class="agreement-text">동의합니다.</span>
                <input type="checkbox" id="agree">
            </div>

            <button id="signup-btn" class="submit-btn">가입 완료하기</button>

            <div class="nav-links">
                <a href="index.html">홈페이지 돌아가기</a>
                <span class="divider"></span>
                <a href="login.html">로그인 하기</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, fetchSignInMethodsForEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAp8majwjPetRnK5u9f_agOWEcW2_veBdw",
            authDomain: "dhchurch-cf85f.firebaseapp.com",
            projectId: "dhchurch-cf85f",
            storageBucket: "dhchurch-cf85f.firebasestorage.app",
            messagingSenderId: "718998916531",
            appId: "1:718998916531:web:6d5641ed5a404c2ee0cfc6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isEmailVerified = false; // 중복 확인 상태값

        const select = document.getElementById('church-select');
        const otherInput = document.getElementById('other-church-input');
        select.addEventListener('change', (e) => {
            otherInput.style.display = e.target.value === '기타' ? 'block' : 'none';
        });

        // 아이디 중복 확인 기능
        const checkBtn = document.getElementById('check-id');
        checkBtn.addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            if(!email || !email.includes('@')) { alert("올바른 이메일 형식을 입력해주세요."); return; }
            
            try {
                const methods = await fetchSignInMethodsForEmail(auth, email);
                if(methods.length > 0) {
                    alert("이미 가입된 아이디입니다.");
                    isEmailVerified = false;
                } else {
                    alert("사용 가능한 아이디입니다.");
                    isEmailVerified = true;
                    checkBtn.innerText = "확인됨";
                    checkBtn.classList.add('verified');
                }
            } catch(e) { alert("중복 확인 중 오류가 발생했습니다."); }
        });

        // 아이디 수정 시 중복 확인 리셋
        document.getElementById('email').addEventListener('input', () => {
            isEmailVerified = false;
            checkBtn.innerText = "중복확인";
            checkBtn.classList.remove('verified');
        });

        // 가입 버튼 실행
        document.getElementById('signup-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password-confirm').value;
            const name = document.getElementById('name').value;
            const nickname = document.getElementById('nickname').value;
            const authCode = document.getElementById('auth-code').value;
            const agree = document.getElementById('agree').checked;
            let church = select.value === '기타' ? otherInput.value : select.value;

            if(!isEmailVerified) { alert("먼저 아이디 중복확인을 완료해주세요."); return; }
            if(!email || !password || !name || !nickname || !church) { alert("모든 항목을 입력해주세요."); return; }
            if(password !== passwordConfirm) { alert("비밀번호가 일치하지 않습니다."); return; }
            if(!agree) { alert("개인정보 이용 동의가 필요합니다."); return; }

            let role = (authCode === "1234") ? "staff" : "user";

            try {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, "users", cred.user.uid), {
                    email, name, nickname, church, role,
                    createdAt: new Date().toISOString()
                });
                alert("대전대흥교회 청소년부에 오신걸 환영합니다");
                window.location.href = "login.html";
            } catch(e) { alert("가입 실패: " + e.message); }
        });
    </script>
</body>
</html>
