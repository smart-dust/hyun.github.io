<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 고급스러운 딥 네이비 & 포인트 컬러 */
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --text-main: #2d3436;
            --text-sub: #636e72;
            --white: #ffffff;
            --error-color: #e74c3c;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .login-card {
            background: var(--white);
            width: 100%;
            max-width: 380px; /* 크기를 소폭 줄임 */
            padding: 45px 40px; 
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            box-sizing: border-box;
            transition: transform 0.3s ease;
        }

        .login-card h2 {
            color: var(--primary-color);
            margin-bottom: 35px;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            position: relative;
        }

        /* 제목 하단 짧은 강조선 */
        .login-card h2::after {
            content: '';
            display: block;
            width: 30px;
            height: 3px;
            background: var(--accent-color);
            margin: 10px auto 0;
            border-radius: 2px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-bottom: 8px;
            font-weight: 500;
            padding-left: 4px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #dfe6e9;
            border-radius: 10px;
            font-size: 0.95rem;
            box-sizing: border-box;
            background-color: #fbfcfc;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600; 
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(44, 62, 80, 0.2);
            letter-spacing: 1px;
        }

        button:hover {
            background-color: #1a252f;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(44, 62, 80, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .find-group {
            margin-top: 25px;
            font-size: 0.8rem;
            color: var(--text-sub);
        }

        .find-group a {
            color: var(--text-sub);
            text-decoration: none;
            transition: color 0.2s;
            cursor: pointer;
            padding: 0 5px;
        }

        .find-group a:hover {
            color: var(--accent-color);
        }

        .divider {
            color: #eee;
            font-weight: 200;
        }

        .back-home-container {
            margin-top: 35px;
            border-top: 1px solid #f1f2f6;
            padding-top: 20px;
        }

        .back-home {
            color: #b2bec3;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .back-home:hover {
            color: var(--text-main);
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>로그인</h2>

    <div class="input-group">
        <label for="email">아이디 (이메일)</label>
        <input type="email" id="email" placeholder="example@email.com" required spellcheck="false" autocomplete="username">
    </div>

    <div class="input-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" placeholder="비밀번호를 입력하세요" required autocomplete="current-password">
    </div>

    <button id="login-btn">LOGIN</button>

    <div class="find-group">
        <a id="find-id">아이디 찾기</a> 
        <span class="divider">|</span> 
        <a id="find-pw">비밀번호 찾기</a>
    </div>

    <div class="back-home-container">
        <a href="index.html" class="back-home">홈페이지로 돌아가기</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAp8majwjPetRnK5u9f_agOWEcW2_veBdw",
        authDomain: "dhchurch-cf85f.firebaseapp.com",
        projectId: "dhchurch-cf85f",
        storageBucket: "dhchurch-cf85f.firebasestorage.app",
        messagingSenderId: "718998916531",
        appId: "1:718998916531:web:6d5641ed5a404c2ee0cfc6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loginBtn = document.getElementById('login-btn');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    const handleLogin = () => {
        const email = emailInput.value;
        const password = passwordInput.value;

        if(!email || !password) return;

        signInWithEmailAndPassword(auth, email, password)
            .then(() => {
                const prevPage = sessionStorage.getItem('redirectURL');
                if (prevPage) {
                    sessionStorage.removeItem('redirectURL');
                    window.location.href = prevPage;
                } else {
                    window.location.href = "index.html"; 
                }
            })
            .catch((error) => {
                console.error("로그인 실패:", error.code);
                alert("아이디 또는 비밀번호가 일치하지 않습니다.");
            });
    };

    loginBtn.addEventListener('click', handleLogin);
    window.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
    });

    document.getElementById('find-id').onclick = (e) => e.preventDefault();
    document.getElementById('find-pw').onclick = (e) => e.preventDefault();
</script>

</body>
</html>
