<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login - 대전대흥교회 청소년부</title>
    <style>
        :root {
            /* 지정하신 메인 컬러를 더 선명하게 활용 */
            --main-color: #6fa8dc;
            --dark-blue: #4a8dc1; /* 더 짙은 포인트 컬러 */
            --bg-color: #e9eff5;  /* 배경도 너무 하얗지 않게 살짝 톤다운 */
            --text-main: #1e272e; /* 아주 진한 남색빛 검정 */
            --text-sub: #576574;
            --white: #ffffff;
        }

        body {
            font-family: 'Pretendard', -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* 1. 로그인 카드: 선명하고 단단한 느낌 */
        .login-card {
            background: var(--white);
            width: 100%;
            max-width: 320px;
            padding: 55px 40px;
            border-radius: 12px;
            /* 그림자를 조금 더 선명하게 해서 입체감 부여 */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 2px solid var(--main-color); /* 테두리를 아예 메인 컬러로 */
        }

        .login-card h2 {
            color: var(--main-color); /* 제목부터 쨍하게 색상 부여 */
            margin-bottom: 40px;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .input-group {
            margin-bottom: 22px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-main);
            margin-bottom: 8px;
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            /* 테두리를 조금 더 진하게 */
            border: 2px solid #ced6e0;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #fff;
            transition: all 0.2s ease;
        }

        /* 선택 시 메인 컬러로 쨍하게 강조 */
        input:focus {
            outline: none;
            border-color: var(--main-color);
        }

        /* 쨍한 파란색 버튼 */
        button {
            width: 100%;
            padding: 16px;
            background-color: var(--main-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s ease;
            box-shadow: 0 4px 10px rgba(111, 168, 220, 0.4);
        }

        button:hover {
            background-color: var(--dark-blue);
            transform: translateY(-1px);
        }

        /* ID / PW 찾기 디자인: 색 빠진 느낌 제거 */
        .find-group {
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--text-sub);
        }

        .find-group a {
            color: var(--text-sub);
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
            cursor: pointer;
        }

        .find-group a:hover {
            color: var(--main-color);
            text-decoration: underline;
        }

        .back-home {
            display: inline-block;
            margin-top: 35px;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .back-home:hover {
            color: var(--text-main);
            text-decoration: underline;
        }

        /* 2. 카드 밖 하단 푸터: 선명도 조절 */
        .footer-info {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 50px;
            gap: 12px;
        }

        .footer-logo {
            width: 30px;
            height: auto;
        }

        .footer-text {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.3px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Member Login</h2>

    <div class="input-group">
        <label for="email">ID</label>
        <input type="email" id="email" required spellcheck="false" autocomplete="off">
    </div>

    <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" required>
    </div>

    <button id="login-btn">Login</button>

    <div class="find-group">
        <a id="find-id">ID 찾기</a> &nbsp; | &
