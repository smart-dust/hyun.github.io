<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login - 대전대흥교회 청소년부</title>
    <style>
        :root {
            /* 지정하신 메인 컬러 (#6fa8dc) 기반 선명한 톤 */
            --main-color: #6fa8dc;
            --dark-blue: #5a94c8;
            --bg-color: #e9eff5;
            --text-main: #1e272e;
            --text-sub: #576574;
            --white: #ffffff;
            --border-color: #ced6e0;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* 1. 로그인 카드: 선명한 테두리 및 여백 최적화 */
        .login-card {
            background: var(--white);
            width: 100%;
            /* 좌우 여유를 위해 max-width를 조금 더 넓히고 padding을 조정 */
            max-width: 380px; 
            padding: 60px 45px; /* 좌우 여백을 늘려 시원하게 구성 */
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); /* 그림자를 조금 더 은은하게 */
            text-align: center;
            border: 2px solid var(--main-color);
            box-sizing: border-box;
        }

        .login-card h2 {
            color: var(--main-color);
            margin-bottom: 45px;
            font-size: 1.7rem; /* 폰트 크기 살짝 키움 */
            font-weight: 800;
            letter-spacing: -1px;
        }

        .input-group {
            margin-bottom: 25px; /* 입력창 사이 간격을 조금 더 넓힘 */
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-main);
            margin-bottom: 10px; /* 라벨과 입력창 사이 여백 */
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 15px 18px; /* 입력창 내부 여백 늘림 */
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #fff;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--main-color);
            background-color: #fff;
        }

        /* Login 버튼: 두께 줄이고 자간 유지 */
        button {
            width: 100%;
            padding: 16px;
            background-color: var(--main-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            /* 글자 두께를 600(Semibold)으로 줄여 세련되게 변경 */
            font-weight: 600; 
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s ease, transform 0.1s ease;
            box-shadow: 0 5px 12px rgba(111, 168, 220, 0.3);
            letter-spacing: 3px; /* 자간 유지 */
            text-indent: 3px;
        }

        button:hover {
            background-color: var(--dark-blue);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        /* ID / PW 찾기 및 하단 링크 디자인 */
        .find-group {
            margin-top: 28px;
            font-size: 0.85rem;
            color: var(--text-sub);
        }

        .find-group a {
            color: var(--text-sub);
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
            cursor: pointer;
        }

        .find-group a:hover {
            color: var(--main-color);
            text-decoration: underline;
        }

        .back-home-container {
            margin-top: 38px;
        }

        .back-home {
            color: #7f8c8d;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: color 0.2s;
        }

        .back-home:hover {
            color: var(--text-main);
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Member Login</h2>

    <div class="input-group">
        <label for="email">ID</label>
        <input type="email" id="email" placeholder="ID를 입력하세요." required spellcheck="false" autocomplete="username">
    </div>

    <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="비밀번호를 입력하세요." required autocomplete="current-password">
    </div>

    <button id="login-btn">Login</button>

    <div class="find-group">
        <a id="find-id">ID 찾기</a> &nbsp; | &nbsp; <a id="find-pw">비밀번호 찾기</a>
    </div>

    <div class="back-home-container">
        <a href="index.html" class="back-home">← 홈페이지로 돌아가기</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Firebase 설정 (기존과 동일)
    const firebaseConfig = {
        apiKey: "AIzaSyAp8majwjPetRnK5u9f_agOWEcW2_veBdw",
        authDomain: "dhchurch-cf85f.firebaseapp.com",
        projectId: "dhchurch-cf85f",
        storageBucket: "dhchurch-cf85f.firebasestorage.app",
        messagingSenderId: "718998916531",
        appId: "1:718998916531:web:6d5641ed5a404c2ee0cfc6",
        measurementId: "G-KKT2TX7SZ9"
    };

    // Firebase 초기화
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loginBtn = document.getElementById('login-btn');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    // 로그인 실행 함수
    const handleLogin = () => {
        const email = emailInput.value;
        const password = passwordInput.value;

        if(!email || !password) return;

        signInWithEmailAndPassword(auth, email, password)
            .then(() => {
                // 성공 시 바로 이동 (alert 없음)
                window.location.href = "admin.html"; 
            })
            .catch((error) => {
                console.error(error);
                // 비밀번호가 틀렸을 때만 알림
                if (error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
                    alert("아이디 또는 비밀번호가 일치하지 않습니다.");
                } else {
                    alert("로그인 중 오류가 발생했습니다.");
                }
            });
    };

    // 버튼 클릭 시 로그인
    loginBtn.addEventListener('click', handleLogin);

    // 엔터키 눌렀을 때도 로그인 되게 추가
    window.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
    });

    // 찾기 버튼 클릭 시 이벤트 전파 방지 (기능 구현 전)
    document.getElementById('find-id').onclick = (e) => e.preventDefault();
    document.getElementById('find-pw').onclick = (e) => e.preventDefault();
</script>

</body>
</html>
