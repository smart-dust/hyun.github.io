<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - 대전대흥교회 청소년부</title>
    <style>
        :root {
            --main-color: #6fa8dc;
            --hover-color: #5a94c8;
            --bg-color: #f4f7f9;
            --text-color: #333;
            --sub-text: #888;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* 로그인 카드 (유지) */
        .login-card {
            background: #ffffff;
            padding: 50px 35px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 320px; /* 창 크기 슬림화 */
            text-align: center;
            z-index: 1;
        }

        .login-card h2 {
            color: var(--text-color);
            margin-bottom: 35px;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #555;
            margin-bottom: 7px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 13px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        /* Glow 효과 제거, 선택 시 기본색 테두리 */
        input:focus {
            outline: none;
            border-color: var(--main-color);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--main-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--hover-color);
        }

        /* ID / PW 찾기 영역 */
        .find-links {
            margin-top: 20px;
            font-size: 0.8rem;
            color: var(--sub-text);
        }

        .find-links a {
            color: var(--sub-text);
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s;
        }

        .find-links a:hover {
            color: var(--main-color);
            text-decoration: underline;
        }

        .back-home {
            display: inline-block;
            margin-top: 30px;
            color: #bbb;
            text-decoration: none;
            font-size: 0.8rem;
        }

        /* 카드 밖 하단 로고 및 교회명 */
        .footer-info {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 40px;
            gap: 10px;
            opacity: 0.6;
        }

        .footer-logo {
            width: 25px;
            height: auto;
        }

        .footer-text {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-color);
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Member Login</h2>

    <div class="input-group">
        <label for="email">ID</label>
        <input type="email" id="email" required spellcheck="false">
    </div>

    <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" required>
    </div>

    <button id="login-btn">Login</button>
    
    <div class="find-links">
        <a id="find-id">ID 찾기</a> &nbsp;|&nbsp; <a id="find-pw">비밀번호 찾기</a>
    </div>

    <a href="index.html" class="back-home">← 홈페이지로 돌아가기</a>
</div>

<div class="footer-info">
    <img src="images/logo.png" alt="" class="footer-logo" onerror="this.style.display='none'">
    <span class="footer-text">대전대흥교회 청소년부</span>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAp8majwjPetRnK5u9f_agOWEcW2_veBdw",
        authDomain: "dhchurch-cf85f.firebaseapp.com",
        projectId: "dhchurch-cf85f",
        storageBucket: "dhchurch-cf85f.firebasestorage.app",
        messagingSenderId: "718998916531",
        appId: "1:718998916531:web:6d5641ed5a404c2ee0cfc6",
        measurementId: "G-KKT2TX7SZ9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loginBtn = document.getElementById('login-btn');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    const handleLogin = () => {
        const email = emailInput.value;
        const password = passwordInput.value;
        if(!email || !password) return;

        signInWithEmailAndPassword(auth, email, password)
            .then(() => {
                window.location.href = "admin.html"; 
            })
            .catch((error) => {
                console.error(error);
                alert("아이디 또는 비밀번호가 일치하지 않습니다.");
            });
    };

    loginBtn.addEventListener('click', handleLogin);
    window.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
    });

    // 찾기 버튼 클릭 시 이벤트 전파 방지 (기능 구현 전)
    document.getElementById('find-id').onclick = (e) => e.preventDefault();
    document.getElementById('find-pw').onclick = (e) => e.preventDefault();
</script>

</body>
</html>
