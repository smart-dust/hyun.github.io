<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 홈페이지 메인 블루 및 라이트 그레이 */
            --hp-blue: #007bff;
            --hp-dark-blue: #0056b3;
            --hp-bg: #f8f9fa;
            --hp-text: #333333;
            --hp-border: #dee2e6;
        }

        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--hp-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--hp-text);
        }

        .login-container {
            width: 100%;
            max-width: 360px; /* 조금 더 컴팩트하게 조절 */
            padding: 40px 30px;
            background: #ffffff;
            border-radius: 16px; /* 홈페이지 버튼 스타일 반영 */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); /* 은은한 그림자 */
            border: 1px solid var(--hp-border);
        }

        .login-container h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--hp-blue);
            text-align: center;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 8px;
            font-weight: 500;
            color: #666;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--hp-border);
            border-radius: 8px;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: all 0.2s ease-in-out;
            background-color: #ffffff;
        }

        input:focus {
            outline: none;
            border-color: var(--hp-blue);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            background-color: var(--hp-blue);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s, transform 0.1s;
        }

        .login-btn:hover {
            background-color: var(--hp-dark-blue);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .links {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 12px;
            font-size: 0.8rem;
            color: #888;
        }

        .links a {
            color: #888;
            text-decoration: none;
            transition: color 0.2s;
        }

        .links a:hover {
            color: var(--hp-blue);
            text-decoration: underline;
        }

        .back-link {
            display: block;
            margin-top: 30px;
            text-align: center;
            font-size: 0.8rem;
            color: #adb5bd;
            text-decoration: none;
        }

        .back-link:hover {
            color: var(--hp-text);
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Login</h2>

    <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="이메일을 입력하세요" required>
    </div>

    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="비밀번호를 입력하세요" required>
    </div>

    <button id="login-btn" class="login-btn">로그인</button>

    <div class="links">
        <a href="#" id="find-id">아이디 찾기</a>
        <span>|</span>
        <a href="#" id="find-pw">비밀번호 찾기</a>
        <span>|</span>
        <a href="signup.html" style="font-weight: 700; color: var(--hp-blue);">회원가입</a>
    </div>

    <a href="index.html" class="back-link">홈페이지로 돌아가기</a>
</div>

<script type="module">
    /* Firebase 로직은 기존 코드를 그대로 사용하세요 (설정값 동일) */
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAp8majwjPetRnK5u9f_agOWEcW2_veBdw",
        authDomain: "dhchurch-cf85f.firebaseapp.com",
        projectId: "dhchurch-cf85f",
        storageBucket: "dhchurch-cf85f.firebasestorage.app",
        messagingSenderId: "718998916531",
        appId: "1:718998916531:web:6d5641ed5a404c2ee0cfc6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loginBtn = document.getElementById('login-btn');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    const handleLogin = () => {
        const email = emailInput.value;
        const password = passwordInput.value;
        if(!email || !password) return;

        signInWithEmailAndPassword(auth, email, password)
            .then(() => {
                const prevPage = sessionStorage.getItem('redirectURL');
                window.location.href = prevPage || "index.html"; 
            })
            .catch((error) => {
                alert("아이디 또는 비밀번호가 일치하지 않습니다.");
            });
    };

    loginBtn.addEventListener('click', handleLogin);
    window.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
</script>

</body>
</html>
