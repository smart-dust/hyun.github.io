<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - 대전대흥교회 청소년부</title>
    <style>
        /* 1. 디자인 (CSS) */
        :root {
            --main-color: #6fa8dc;     /* 지정하신 메인 컬러 */
            --hover-color: #5a94c8;    /* 호버 시 약간 어둡게 */
            --bg-color: #f0f4f8;
            --text-color: #333333;     /* 진한 검정색 */
            --border-color: #e1e8ed;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text-color);
        }

        .login-card {
            background: #ffffff;
            padding: 50px 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); /* 은은한 그림자 */
            width: 100%;
            max-width: 340px; /* 창 크기를 조금 더 작게 조절 */
            text-align: center;
        }

        /* 로고와 제목 가로 배치 */
        .header-group {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            gap: 10px; /* 로고와 글자 사이 간격 */
        }

        .login-logo {
            width: 40px; /* 로고 크기 조절 */
            height: auto;
        }

        .login-card h2 {
            color: var(--text-color); /* 글자색 검정 */
            margin: 0;
            font-size: 1.4rem; /* 적절한 크기로 조절 */
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #555;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color); /* 테두리 선명하게 */
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s; /* 부드러운 전환 */
            background-color: #fff;
        }

        input:focus {
            outline: none;
            border-color: var(--main-color); /* 선택 시 메인 컬러로 테두리 변경 */
            /* Glow(그림자) 효과 제거 */
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--main-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: var(--hover-color);
        }

        button:active {
            transform: scale(0.98); /* 클릭 시 살짝 눌리는 효과 */
        }

        .back-home {
            display: inline-block;
            margin-top: 30px;
            color: #aaa;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .back-home:hover {
            color: var(--text-color);
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="header-group">
        <img src="images/logo.png" alt="Logo" class="login-logo" onerror="this.style.display='none'">
        <h2>대전대흥교회 청소년부</h2>
    </div>

    <div class="input-group">
        <label for="email">ID</label>
        <input type="email" id="email" required spellcheck="false">
    </div>

    <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" required>
    </div>

    <button id="login-btn">Login</button>
    
    <a href="index.html" class="back-home">← 홈페이지로 돌아가기</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Firebase 설정 (기존과 동일)
    const firebaseConfig = {
        apiKey: "AIzaSyAp8majwjPetRnK5u9f_agOWEcW2_veBdw",
        authDomain: "dhchurch-cf85f.firebaseapp.com",
        projectId: "dhchurch-cf85f",
        storageBucket: "dhchurch-cf85f.firebasestorage.app",
        messagingSenderId: "718998916531",
        appId: "1:718998916531:web:6d5641ed5a404c2ee0cfc6",
        measurementId: "G-KKT2TX7SZ9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loginBtn = document.getElementById('login-btn');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    const handleLogin = () => {
        const email = emailInput.value;
        const password = passwordInput.value;

        if(!email || !password) return;

        signInWithEmailAndPassword(auth, email, password)
            .then(() => {
                // 성공 시 바로 이동 (alert 없음)
                window.location.href = "admin.html"; 
            })
            .catch((error) => {
                console.error(error);
                // 비밀번호가 틀렸을 때만 알림
                if (error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
                    alert("아이디 또는 비밀번호가 일치하지 않습니다.");
                } else {
                    alert("로그인 중 오류가 발생했습니다.");
                }
            });
    };

    loginBtn.addEventListener('click', handleLogin);
    window.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
    });
</script>

</body>
</html>
