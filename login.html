<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login - 대전대흥교회 청소년부</title>
    <style>
        :root {
            --main-color: #6fa8dc;
            --hover-color: #5a94c8;
            --bg-color: #f5f7fa;
            --text-main: #2d3436;
            --text-sub: #636e72;
            --border-color: #dfe6e9;
        }

        body {
            font-family: 'Pretendard', -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column; /* 세로 배치 */
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* 1. 로그인 카드 디자인 */
        .login-card {
            background: #ffffff;
            width: 100%;
            max-width: 320px; /* 더 단단해 보이는 슬림한 폭 */
            padding: 50px 35px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            border: 1px solid #edf2f7;
        }

        .login-card h2 {
            color: var(--text-main);
            margin-bottom: 35px;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 13px 15px;
            border: 1.5px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            box-sizing: border-box;
            background-color: #fff;
            transition: all 0.2s ease;
        }

        /* 선택 시 Glow 없이 테두리 색상만 변경 */
        input:focus {
            outline: none;
            border-color: var(--main-color);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--main-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s ease;
        }

        button:hover {
            background-color: var(--hover-color);
        }

        /* ID / PW 찾기 디자인 */
        .find-group {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #b2bec3;
        }

        .find-group a {
            color: #b2bec3;
            text-decoration: none;
            transition: color 0.2s;
            cursor: pointer;
        }

        .find-group a:hover {
            color: var(--main-color);
            text-decoration: underline;
        }

        .back-home {
            display: inline-block;
            margin-top: 35px;
            color: #bdc3c7;
            text-decoration: none;
            font-size: 0.8rem;
        }

        .back-home:hover {
            color: var(--text-sub);
            text-decoration: underline;
        }

        /* 2. 카드 밖 하단 로고 및 교회 이름 */
        .footer-info {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 45px;
            gap: 12px;
            opacity: 0.5; /* 배경처럼 은은하게 */
        }

        .footer-logo {
            width: 28px;
            height: auto;
        }

        .footer-text {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: -0.3px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Member Login</h2>

    <div class="input-group">
        <label for="email">ID</label>
        <input type="email" id="email" required spellcheck="false" autocomplete="off">
    </div>

    <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" required>
    </div>

    <button id="login-btn">Login</button>

    <div class="find-group">
        <a id="find-id">ID 찾기</a> &nbsp; | &nbsp; <a id="find-pw">비밀번호 찾기</a>
    </div>

    <a href="index.html" class="back-home">← 홈페이지로 돌아가기</a>
</div>

<footer class="footer-info">
    <img src="images/logo.png" alt="" class="footer-logo" onerror="this.style.display='none'">
    <span class="footer-text">대전대흥교회 청소년부</span>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAp8majwjPetRnK5u9f_agOWEcW2_veBdw",
        authDomain: "dhchurch-cf85f.firebaseapp.com",
        projectId: "dhchurch-cf85f",
        storageBucket: "dhchurch-cf85f.firebasestorage.app",
        messagingSenderId: "718998916531",
        appId: "1:718998916531:web:6d5641ed5a404c2ee0cfc6",
        measurementId: "G-KKT2TX7SZ9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loginBtn = document.getElementById('login-btn');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    const handleLogin = () => {
        const email = emailInput.value;
        const password = passwordInput.value;
        if(!email || !password) return;

        signInWithEmailAndPassword(auth, email, password)
            .then(() => {
                window.location.href = "admin.html"; 
            })
            .catch((error) => {
                console.error(error);
                alert("아이디 또는 비밀번호가 일치하지 않습니다.");
            });
    };

    loginBtn.addEventListener('click', handleLogin);
    window.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
    });

    // 추후 구현을 위한 클릭 방지
    document.getElementById('find-id').onclick = (e) => e.preventDefault();
    document.getElementById('find-pw').onclick = (e) => e.preventDefault();
</script>

</body>
</html>
