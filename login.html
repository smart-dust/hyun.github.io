<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - 대전대흥교회 청소년부</title>
    <style>
        /* 1. 디자인 (CSS) */
        :root {
            --main-color: #6fa8dc;     /* 지정하신 메인 컬러 */
            --point-color: #4a90e2;    /* 좀 더 쨍한 포인트 컬러 */
            --bg-color: #f0f4f8;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Pretendard', -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: #ffffff;
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        /* 폰트 크기 키우고 메인 컬러 적용 */
        .login-card h2 {
            color: var(--main-color); 
            margin-bottom: 45px;
            font-size: 1.8rem; /* 폰트 크기 대폭 확대 */
            font-weight: 800;
            letter-spacing: -1px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.9rem;
            color: #444;
            margin-bottom: 8px;
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e8ed; /* 테두리 조금 더 선명하게 */
            border-radius: 12px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s;
            background-color: #fff;
        }

        input:focus {
            outline: none;
            border-color: var(--main-color);
            box-shadow: 0 0 0 4px rgba(111, 168, 220, 0.2);
        }

        /* 쨍한 색감의 LOGIN 버튼 */
        button {
            width: 100%;
            padding: 16px;
            background-color: var(--main-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
            letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(111, 168, 220, 0.3);
        }

        button:hover {
            background-color: var(--point-color); /* 호버 시 더 쨍한 색상 */
            transform: translateY(-2px); /* 살짝 떠오르는 효과 */
        }

        .back-home {
            display: inline-block;
            margin-top: 35px;
            color: #bdc3c7;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-home:hover {
            color: var(--text-color);
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>대전대흥교회 청소년부</h2>

    <div class="input-group">
        <label for="email">ID</label>
        <input type="email" id="email" required spellcheck="false">
    </div>

    <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" required>
    </div>

    <button id="login-btn">LOGIN</button>
    
    <a href="index.html" class="back-home">← Home</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAp8majwjPetRnK5u9f_agOWEcW2_veBdw",
        authDomain: "dhchurch-cf85f.firebaseapp.com",
        projectId: "dhchurch-cf85f",
        storageBucket: "dhchurch-cf85f.firebasestorage.app",
        messagingSenderId: "718998916531",
        appId: "1:718998916531:web:6d5641ed5a404c2ee0cfc6",
        measurementId: "G-KKT2TX7SZ9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loginBtn = document.getElementById('login-btn');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    const handleLogin = () => {
        const email = emailInput.value;
        const password = passwordInput.value;

        if(!email || !password) return;

        signInWithEmailAndPassword(auth, email, password)
            .then(() => {
                // 성공 시 바로 이동 (alert 없음)
                window.location.href = "admin.html"; 
            })
            .catch((error) => {
                console.error(error);
                alert("정보가 일치하지 않습니다.");
            });
    };

    loginBtn.addEventListener('click', handleLogin);
    window.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
    });
</script>

</body>
</html>
