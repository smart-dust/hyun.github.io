<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login - 대전대흥교회 청소년부</title>
    <style>
        :root {
            --main-color: #6fa8dc;
            --dark-blue: #5a94c8;
            --bg-color: #e9eff5;
            --text-main: #1e272e;
            --text-sub: #576574;
            --white: #ffffff;
            --border-color: #ced6e0;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .login-card {
            background: var(--white);
            width: 100%;
            max-width: 440px; 
            padding: 60px 50px; 
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
            border: 2px solid var(--main-color);
            box-sizing: border-box;
        }

        .login-card h2 {
            color: var(--main-color);
            margin-bottom: 45px;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-main);
            margin-bottom: 10px;
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 15px 18px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #fff;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--main-color);
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--main-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600; 
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s ease, transform 0.1s ease;
            box-shadow: 0 5px 12px rgba(111, 168, 220, 0.3);
            letter-spacing: 3px;
            text-indent: 3px;
        }

        button:hover {
            background-color: var(--dark-blue);
            transform: translateY(-1px);
        }

        .find-group {
            margin-top: 28px;
            font-size: 0.85rem;
            color: var(--text-sub);
        }

        .find-group a {
            color: var(--text-sub);
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
            cursor: pointer;
        }

        .find-group a:hover {
            color: var(--main-color);
            text-decoration: underline;
        }

        .back-home-container {
            margin-top: 38px;
        }

        .back-home {
            color: #7f8c8d;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: color 0.2s;
        }

        .back-home:hover {
            color: var(--text-main);
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Member Login</h2>

    <div class="input-group">
        <label for="email">ID</label>
        <input type="email" id="email" placeholder="ID를 입력해주세요" required spellcheck="false" autocomplete="username">
    </div>

    <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="비밀번호를 입력해주세요" required autocomplete="current-password">
    </div>

    <button id="login-btn">Login</button>

    <div class="find-group">
        <a id="find-id">ID 찾기</a> &nbsp; | &nbsp; <a id="find-pw">비밀번호 찾기</a>
    </div>

    <div class="back-home-container">
        <a href="index.html" class="back-home">← 홈페이지로 돌아가기</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAp8majwjPetRnK5u9f_agOWEcW2_veBdw",
        authDomain: "dhchurch-cf85f.firebaseapp.com",
        projectId: "dhchurch-cf85f",
        storageBucket: "dhchurch-cf85f.firebasestorage.app",
        messagingSenderId: "718998916531",
        appId: "1:718998916531:web:6d5641ed5a404c2ee0cfc6",
        measurementId: "G-KKT2TX7SZ9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loginBtn = document.getElementById('login-btn');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    const handleLogin = () => {
        const email = emailInput.value;
        const password = passwordInput.value;

        if(!email || !password) return;

        signInWithEmailAndPassword(auth, email, password)
            .then(() => {
                window.location.href = "admin.html"; 
            })
            .catch((error) => {
                console.error("로그인 실패:", error.code);
                // 모든 에러 메시지를 하나로 통일
                alert("아이디 또는 비밀번호가 일치하지 않습니다.");
            });
    };

    loginBtn.addEventListener('click', handleLogin);
    window.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
    });

    document.getElementById('find-id').onclick = (e) => e.preventDefault();
    document.getElementById('find-pw').onclick = (e) => e.preventDefault();
</script>

</body>
</html>
