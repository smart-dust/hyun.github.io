<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인 - 대전대흥교회 청소년부</title>
    <style>
        /* 1. 디자인 (CSS) */
        :root {
            /* 지정하신 메인 컬러 */
            --main-color: #6fa8dc; 
            --hover-color: #5a94c8; /* 호버 시 약간 어둡게 */
            --bg-color: #f4f7f9;
            --text-color: #333;
            --border-color: #dcdde1;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text-color);
        }

        .login-card {
            background: #ffffff;
            padding: 50px 40px; /* 위아래 여백을 더 늘려 담백함 강조 */
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); /* 더 은은한 그림자 */
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        .login-card h2 {
            color: var(--text-color);
            margin-bottom: 40px; /* 입력창과의 간격 넓힘 */
            font-size: 1.3rem; /* 너무 크지 않게 조절 */
            font-weight: 700;
            letter-spacing: -0.5px; /* 글자 간격 살짝 좁힘 */
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #555;
            margin-bottom: 8px;
            font-weight: 600;
            margin-left: 2px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px; /* 약간만 둥글게 */
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s ease-in-out;
            background-color: #fff; /* 완전 흰색 배경 */
        }

        input:focus {
            outline: none;
            border-color: var(--main-color); /* 지정하신 색상으로 강조 */
            box-shadow: 0 0 0 3px rgba(111, 168, 220, 0.15); /* 강조색 기반 은은한 효과 */
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--main-color); /* 지정하신 색상 */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
            letter-spacing: 1px; /* LOGIN 글자 간격 살짝 넓힘 */
        }

        button:hover {
            background-color: var(--hover-color);
        }

        .back-home {
            display: inline-block;
            margin-top: 30px;
            color: #aaa; /* 더 연한 회색 */
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .back-home:hover {
            color: var(--text-color);
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>대전대흥교회 청소년부</h2>

    <div class="input-group">
        <label for="email">ID</label>
        <input type="email" id="email" required>
    </div>

    <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" required>
    </div>

    <button id="login-btn">LOGIN</button>
    
    <a href="index.html" class="back-home">← 홈페이지로 돌아가기</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Firebase 설정 (기존과 동일)
    const firebaseConfig = {
        apiKey: "AIzaSyAp8majwjPetRnK5u9f_agOWEcW2_veBdw",
        authDomain: "dhchurch-cf85f.firebaseapp.com",
        projectId: "dhchurch-cf85f",
        storageBucket: "dhchurch-cf85f.firebasestorage.app",
        messagingSenderId: "718998916531",
        appId: "1:718998916531:web:6d5641ed5a404c2ee0cfc6",
        measurementId: "G-KKT2TX7SZ9"
    };

    // Firebase 초기화
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loginBtn = document.getElementById('login-btn');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    // 로그인 실행 함수
    const handleLogin = () => {
        const email = emailInput.value;
        const password = passwordInput.value;

        if(!email || !password) {
            alert("아이디와 비밀번호를 모두 입력해주세요.");
            return;
        }

        signInWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
                // 로그인 성공 시
                alert("반갑습니다, 관리자님!");
                window.location.href = "admin.html"; // 관리자 페이지로 이동
            })
            .catch((error) => {
                // 로그인 실패 시
                console.error(error.code, error.message);
                alert("로그인에 실패했습니다. 아이디 또는 비밀번호를 확인해주세요.");
            });
    };

    // 버튼 클릭 시 로그인
    loginBtn.addEventListener('click', handleLogin);

    // 엔터키 눌렀을 때도 로그인 되게 추가
    window.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
    });
</script>

</body>
</html>
