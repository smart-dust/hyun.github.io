<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-color: #007bff; /* 홈페이지 메인 블루 */
            --brand-hover: #0062cc;
            --text-dark: #2d3436;
            --text-light: #636e72;
            --bg-soft: #fbfcfd;
            --white: #ffffff;
            --input-border: #e9ecef;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f1f3f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .login-card {
            width: 100%;
            max-width: 350px; /* 더 컴팩트하고 고급스러운 비율 */
            padding: 50px 40px;
            background: var(--white);
            border-radius: 24px; /* 더 둥글고 부드러운 모서리 */
            /* 프리미엄 소프트 쉐도우 */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04), 0 20px 60px rgba(0, 0, 0, 0.03);
            text-align: center;
            box-sizing: border-box;
        }

        .login-card h2 {
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 40px;
            color: var(--text-dark);
            letter-spacing: -1px;
        }

        .input-group {
            margin-bottom: 22px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--text-dark);
            padding-left: 2px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid var(--input-border);
            border-radius: 12px;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: var(--bg-soft);
            color: var(--text-dark);
        }

        input::placeholder {
            color: #adb5bd;
        }

        input:focus {
            outline: none;
            border-color: var(--brand-color);
            background-color: var(--white);
            box-shadow: 0 0 0 4px rgba(0, 123, 255, 0.08);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background-color: var(--brand-color);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.15);
        }

        .btn-login:hover {
            background-color: var(--brand-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(0, 123, 255, 0.2);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .options {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-size: 0.78rem;
            color: #adb5bd;
        }

        .options a {
            color: var(--text-light);
            text-decoration: none;
            transition: color 0.2s;
        }

        .options a:hover {
            color: var(--brand-color);
        }

        .options span {
            font-size: 0.6rem;
            color: #dee2e6;
        }

        .footer {
            margin-top: 40px;
            padding-top: 25px;
            border-top: 1px solid #f8f9fa;
        }

        .back-home {
            color: #adb5bd;
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
        }

        .back-home:hover {
            color: var(--text-dark);
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>로그인</h2>

    <div class="input-group">
        <label for="email">ID</label>
        <input type="email" id="email" placeholder="아이디를 입력해주세요" required spellcheck="false">
    </div>

    <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="비밀번호를 입력해주세요" required>
    </div>

    <button id="login-btn" class="btn-login">로그인</button>

    <div class="options">
        <a href="#" id="find-id">아이디 찾기</a>
        <span>●</span>
        <a href="#" id="find-pw">비밀번호 찾기</a>
        <span>●</span>
        <a href="signup.html" style="font-weight: 700; color: var(--brand-color);">회원가입</a>
    </div>

    <div class="footer">
        <a href="index.html" class="back-home">홈페이지로 돌아가기</a>
    </div>
</div>

<script type="module">
    // Firebase 로직은 기존 설정을 그대로 유지합니다.
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAp8majwjPetRnK5u9f_agOWEcW2_veBdw",
        authDomain: "dhchurch-cf85f.firebaseapp.com",
        projectId: "dhchurch-cf85f",
        storageBucket: "dhchurch-cf85f.firebasestorage.app",
        messagingSenderId: "718998916531",
        appId: "1:718998916531:web:6d5641ed5a404c2ee0cfc6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loginBtn = document.getElementById('login-btn');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    const handleLogin = () => {
        const email = emailInput.value;
        const password = passwordInput.value;
        if(!email || !password) return;

        signInWithEmailAndPassword(auth, email, password)
            .then(() => {
                const prevPage = sessionStorage.getItem('redirectURL');
                window.location.href = prevPage || "index.html"; 
            })
            .catch((error) => {
                alert("아이디 또는 비밀번호가 일치하지 않습니다.");
            });
    };

    loginBtn.addEventListener('click', handleLogin);
    window.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
</script>

</body>
</html>
