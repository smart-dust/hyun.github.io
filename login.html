<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | 대전대흥교회 청소년부</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-color: #add8e6; 
            --primary-blue: #007bff;
            --footer-bg: #f8fbff; 
            --text-main: #212529;
            --text-sub: #6c757d;
            --border-color: #dee2e6;
        }

        /* 1080*1920 기준 스크롤 억제 */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #ffffff;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 40px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-section h1 {
            font-size: 2.3rem;
            font-weight: 900;
            color: var(--primary-blue);
            margin: 0;
            letter-spacing: -1.5px;
        }

        .header-section p {
            color: var(--text-sub);
            margin-top: 8px;
            font-size: 1.05rem;
        }

        .login-form {
            width: 100%;
            max-width: 450px; /* 로그인창은 조금 더 컴팩트하게 */
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        input {
            width: 100%;
            padding: 12px 0;
            border: none;
            border-bottom: 1.5px solid var(--border-color);
            font-size: 1.05rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
            background-color: transparent;
        }

        input:focus {
            outline: none;
            border-bottom: 2px solid var(--primary-blue);
        }

        .submit-btn {
            padding: 16px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background-color: #0056b3;
        }

        .sub-nav {
            text-align: center;
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .sub-nav a {
            color: #aaa;
            text-decoration: none;
            font-size: 0.85rem;
        }

        .sub-nav span {
            color: #eee;
            font-size: 0.85rem;
        }

        .sub-nav a:hover {
            color: var(--primary-blue);
            text-decoration: underline;
        }

        /* Footer 스타일 (회원가입 페이지와 동일) */
        .footer {
            background: var(--footer-bg);
            color: #555;
            padding: 35px 20px;
            text-align: center;
            border-top: 2.5px solid var(--main-color);
        }

        .footer p {
            margin: 5px 0;
            font-size: 13.5px;
            line-height: 1.5;
            color: #666;
        }

        .footer-copy {
            margin-top: 15px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-section">
            <h1>대전대흥교회 청소년부</h1>
            <p>서비스 이용을 위해 로그인을 해주세요.</p>
        </div>

        <div class="login-form">
            <div class="field">
                <label for="email">아이디 (이메일)</label>
                <input type="email" id="email" placeholder="아이디를 입력해주세요" required>
            </div>

            <div class="field">
                <label for="password">비밀번호</label>
                <input type="password" id="password" placeholder="비밀번호를 입력해주세요" required>
            </div>

            <button id="login-btn" class="submit-btn">로그인</button>

            <div class="sub-nav">
                <a href="signup.html" style="color: var(--primary-blue); font-weight: 700;">회원가입</a>
                <span>|</span>
                <a href="index.html">홈페이지로 돌아가기</a>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>주소: 대전광역시 중구 충무로 11번길 43 (교육선교관 2층)</p>
        <p>전화: 042-123-4567 | 이메일: youth@dhchurch.org</p>
        <p class="footer-copy">© 2026 대전대흥교회 청소년부. All rights reserved.</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAp8majwjPetRnK5u9f_agOWEcW2_veBdw",
            authDomain: "dhchurch-cf85f.firebaseapp.com",
            projectId: "dhchurch-cf85f",
            storageBucket: "dhchurch-cf85f.firebasestorage.app",
            messagingSenderId: "718998916531",
            appId: "1:718998916531:web:6d5641ed5a404c2ee0cfc6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginBtn = document.getElementById('login-btn');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        const handleLogin = () => {
            const email = emailInput.value;
            const password = passwordInput.value;

            if (!email || !password) {
                alert("아이디와 비밀번호를 입력해주세요.");
                return;
            }

            signInWithEmailAndPassword(auth, email, password)
                .then(() => {
                    const prevPage = sessionStorage.getItem('redirectURL');
                    window.location.href = prevPage || "index.html"; 
                })
                .catch((error) => {
                    alert("아이디 또는 비밀번호가 일치하지 않습니다.");
                });
        };

        loginBtn.addEventListener('click', handleLogin);
        window.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
    </script>
</body>
</html>
