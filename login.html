<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>로그인 | 대전대흥교회 청소년부</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0062ff;
            --text-dark: #1d1d1f;
            --text-gray: #86868b;
            --border-color: #d2d2d7;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #ffffff;
            color: var(--text-dark);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }
        .container { width: 100%; max-width: 400px; }
        header { text-align: center; margin-bottom: 45px; }
        header h1 { font-size: 2rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 12px; color: var(--primary-blue); }
        header p { font-size: 0.95rem; color: var(--text-gray); font-weight: 500; }
        .login-form { display: flex; flex-direction: column; gap: 22px; }
        .field { display: flex; flex-direction: column; gap: 8px; }
        
        /* 비밀번호 필드 위치 조정을 위한 상대 위치 설정 */
        .password-wrapper { position: relative; width: 100%; }
        
        label { font-size: 0.9rem; font-weight: 800; position: relative; padding-left: 14px; color: #333; }
        label::before {
            content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
            width: 4px; height: 14px; background-color: var(--primary-blue); border-radius: 2px;
        }
        input {
            width: 100%; padding: 16px; border: 1px solid var(--border-color);
            border-radius: 12px; font-size: 1rem; background-color: #fff;
            transition: var(--transition); outline: none;
        }
        /* 비밀번호 인풋은 우측 버튼 공간(오른쪽 패딩) 확보 */
        #password { padding-right: 50px; }
        input:focus { border-color: var(--primary-blue); box-shadow: 0 0 0 4px rgba(0, 98, 255, 0.1); }
        
        /* 비밀번호 보기/숨기기 토글 버튼 스타일 */
        .toggle-password {
            position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
            background: none; border: none; font-size: 1.2rem; cursor: pointer;
            padding: 4px; display: flex; align-items: center; justify-content: center;
            user-select: none; transition: var(--transition); opacity: 0.6;
        }
        .toggle-password:hover { opacity: 1; }

        .login-btn {
            padding: 18px; background: linear-gradient(135deg, #0062ff 0%, #004dc7 100%);
            color: white; border: none; border-radius: 12px; font-size: 1.1rem;
            font-weight: 700; cursor: pointer; margin-top: 10px; transition: var(--transition);
            box-shadow: 0 4px 12px rgba(0, 98, 255, 0.2);
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0, 98, 255, 0.3); }
        .nav-links { text-align: center; margin-top: 25px; display: flex; justify-content: center; align-items: center; gap: 12px; }
        .nav-links a { color: var(--text-gray); text-decoration: none; font-size: 0.85rem; font-weight: 500; padding: 6px 12px; border-radius: 8px; transition: var(--transition); }
        .nav-links a:hover { background-color: #f2f2f7; color: var(--primary-blue); }
        .divider { width: 1px; height: 10px; background-color: var(--border-color); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>대전대흥교회 청소년부</h1>
            <p>서비스 이용을 위해 로그인을 해주세요</p>
        </header>

        <div class="login-form">
            <div class="field">
                <label for="email">ID</label>
                <input type="email" id="email" placeholder="아이디를 입력해주세요" required>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="비밀번호를 입력해주세요" required>
                    <button type="button" id="toggle-password" class="toggle-password" title="비밀번호 보기">👁️</button>
                </div>
            </div>

            <button id="login-btn" class="login-btn">로그인</button>

            <div class="nav-links">
                <a href="signup.html">회원가입 </a>
                <span class="divider"></span>
                <a href="index.html">홈페이지로 돌아가기</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAp8majwjPetRnK5u9f_agOWEcW2_veBdw",
            authDomain: "dhchurch-cf85f.firebaseapp.com",
            projectId: "dhchurch-cf85f",
            storageBucket: "dhchurch-cf85f.firebasestorage.app",
            messagingSenderId: "718998916531",
            appId: "1:718998916531:web:6d5641ed5a404c2ee0cfc6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 중복 코드를 줄이기 위해 로그인 로직을 하나의 함수로 분리
        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if(!email || !password) {
                alert("아이디와 비밀번호를 모두 입력해주세요.");
                return;
            }

            try {
                await setPersistence(auth, browserSessionPersistence);
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "index.html"; 
            } catch(e) {
                alert("로그인 실패: 이메일 또는 비밀번호를 확인해주세요.");
                console.error(e.message);
            }
        }

        // 1. 로그인 버튼 클릭 이벤트
        document.getElementById('login-btn').addEventListener('click', handleLogin);

        // 2. ID 및 비밀번호 입력창에서 엔터(Enter)키 누를 시 로그인 실행
        document.getElementById('email').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

        // 3. 비밀번호 보기 / 숨기기 토글 이벤트
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('toggle-password');

        togglePasswordBtn.addEventListener('click', () => {
            // 현재 타입이 password면 text로, text면 password로 변경
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                togglePasswordBtn.textContent = '🔒'; // 보일 때는 잠금 아이콘으로 변경 (또는 다른 이모지)
                togglePasswordBtn.setAttribute('title', '비밀번호 숨기기');
            } else {
                passwordInput.type = 'password';
                togglePasswordBtn.textContent = '👁️'; // 숨겨졌을 때는 눈 아이콘으로 변경
                togglePasswordBtn.setAttribute('title', '비밀번호 보기');
            }
        });
    </script>
</body>
</html>
