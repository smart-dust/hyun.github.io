<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login - 대전대흥교회 청소년부</title>
    <style>
        :root {
            --main-color: #6fa8dc;
            --dark-blue: #4a8dc1;
            --bg-color: #e9eff5;
            --text-main: #1e272e;
            --text-sub: #576574;
            --white: #ffffff;
        }

        body {
            font-family: 'Pretendard', -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* 1. 로그인 카드: 선명하고 단단한 테두리 유지 */
        .login-card {
            background: var(--white);
            width: 100%;
            max-width: 320px;
            padding: 55px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 2px solid var(--main-color);
            box-sizing: border-box;
        }

        .login-card h2 {
            color: var(--main-color);
            margin-bottom: 40px;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .input-group {
            margin-bottom: 22px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-main);
            margin-bottom: 8px;
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #ced6e0;
            border-radius: 8px;
            font-size: 0.95rem;
            box-sizing: border-box;
            background-color: #fff;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--main-color);
        }

        /* Login 버튼: 자간 넓게 조절 */
        button {
            width: 100%;
            padding: 16px;
            background-color: var(--main-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s ease;
            box-shadow: 0 4px 10px rgba(111, 168, 220, 0.4);
            letter-spacing: 3px; /* 자간을 넓혀 시원하게 변경 */
            text-indent: 3px; /* 중앙 정렬을 위해 왼쪽 여백 추가 */
        }

        button:hover {
            background-color: var(--dark-blue);
            transform: translateY(-1px);
        }

        /* ID / PW 찾기 디자인 살림 */
        .find-group {
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--text-sub);
        }

        .find-group a {
            color: var(--text-sub);
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
            cursor: pointer;
        }

        .find-group a:hover {
            color: var(--main-color);
            text-decoration: underline;
        }

        /* 홈페이지로 돌아가기 디자인 살림 */
        .back-home-container {
            margin-top: 35px;
        }

        .back-home {
            color: #7f8c8d;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: color 0.2s;
        }

        .back-home:hover {
            color: var(--text-main);
            text-decoration: underline;
        }

        /* 2. 카드 밖 하단 푸터 */
        .footer-info {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 50px;
            gap: 12px;
        }

        .footer-logo {
            width: 30px;
            height: auto;
        }

        .footer-text {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.3px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Member Login</h2>

    <div class="input-group">
        <label for="email">ID</label>
        <input type="email" id="email" placeholder="ID를 입력하세요." required spellcheck="false" autocomplete="off">
    </div>

    <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="비밀번호를 입력하세요." required>
    </div>

    <button id="login-btn">Login</button>

    <div class="find-group">
        <a id="find-id">ID 찾기</a> &nbsp; | &nbsp; <a id="find-pw">비밀번호 찾기</a>
    </div>

    <div class="back-home-container">
        <a href="index.html" class="back-home">← 홈페이지로 돌아가기</a>
    </div>
</div>

<footer class="footer-info">
    <img src="images/logo.png" alt="" class="footer-logo" onerror="this.style.display='none'">
    <span class="footer-text">대전대흥교회 청소년부</span>
</footer>
